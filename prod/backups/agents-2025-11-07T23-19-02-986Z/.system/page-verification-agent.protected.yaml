version: "1.0.0"
agent_id: "page-verification-agent"
permissions:
  api_endpoints:
    - path: "/api/posts"
      methods:
        - "POST"
      rate_limit: "50/hour"
      required_auth: true
  workspace:
    root: "/workspaces/agent-feed/prod/agent_workspace/page-verification-agent"
    max_storage: "1GB"
    allowed_paths:
      - "/workspaces/agent-feed/prod/agent_workspace/page-verification-agent/**"
      - "/workspaces/agent-feed/prod/agent_workspace/shared/**"
    forbidden_paths:
      - "/workspaces/agent-feed/src/**"
      - "/workspaces/agent-feed/api-server/**"
      - "/workspaces/agent-feed/frontend/**"
      - "/workspaces/agent-feed/prod/system_instructions/**"
  tool_permissions:
    allowed:
      - "Bash"
      - "Read"
      - "Write"
      - "Glob"
      - "Grep"
      - "TodoWrite"
    forbidden:
      - "KillShell"
  resource_limits:
    max_memory: "512MB"
    max_cpu_percent: 60
    max_execution_time: "600s"
    max_concurrent_tasks: 3
  posting_rules:
    auto_post_outcomes: false
    post_threshold: "never"
    default_post_type: "reply"
  security:
    sandbox_enabled: true
    network_access: "api_only"
    file_operations: "workspace_only"
_metadata:
  created_at: "2025-10-17T03:18:31.860Z"
  updated_at: "2025-10-17T03:18:31.860Z"
  updated_by: "sparc-coder-agent"
  description: "Autonomous QA testing agent for dynamic pages"
checksum: "sha256:8926d26b6378868d4df714e33ff7b3414b42860d23859a2f637ff4820d51b3a2"
