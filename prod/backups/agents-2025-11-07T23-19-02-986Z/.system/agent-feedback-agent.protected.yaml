version: "1.0.0"
agent_id: "agent-feedback-agent"
permissions:
  api_endpoints:
    - path: "/api/posts"
      methods:
        - "POST"
      rate_limit: "100/hour"
      required_auth: true
  workspace:
    root: "/workspaces/agent-feed/prod/agent_workspace/agent-feedback-agent"
    max_storage: "512MB"
    allowed_paths:
      - "/workspaces/agent-feed/prod/agent_workspace/agent-feedback-agent/**"
      - "/workspaces/agent-feed/prod/agent_workspace/shared/**"
    forbidden_paths:
      - "/workspaces/agent-feed/src/**"
      - "/workspaces/agent-feed/api-server/**"
      - "/workspaces/agent-feed/frontend/**"
      - "/workspaces/agent-feed/prod/system_instructions/**"
  tool_permissions:
    allowed:
      - "Read"
      - "Write"
      - "Edit"
      - "MultiEdit"
      - "Glob"
      - "Grep"
      - "TodoWrite"
      - "Bash"
    forbidden:
      - "KillShell"
  resource_limits:
    max_memory: "256MB"
    max_cpu_percent: 50
    max_execution_time: "300s"
    max_concurrent_tasks: 3
  posting_rules:
    auto_post_outcomes: false
    post_threshold: "never"
    default_post_type: "reply"
  security:
    sandbox_enabled: true
    network_access: "api_only"
    file_operations: "workspace_only"
_metadata:
  created_at: "2025-10-17T03:18:31.774Z"
  updated_at: "2025-10-17T03:18:31.774Z"
  updated_by: "sparc-coder-agent"
  description: "System agent for feedback collection and agent improvement tracking"
checksum: "sha256:3456f3692a305df9f2b7b9de68557199323afc1196d2ac9ec9d1c69c2f199994"
