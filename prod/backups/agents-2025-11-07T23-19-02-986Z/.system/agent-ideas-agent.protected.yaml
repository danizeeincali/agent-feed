version: "1.0.0"
agent_id: "agent-ideas-agent"
permissions:
  api_endpoints:
    - path: "/api/posts"
      methods:
        - "POST"
      rate_limit: "50/hour"
      required_auth: true
  workspace:
    root: "/workspaces/agent-feed/prod/agent_workspace/agent-ideas-agent"
    max_storage: "256MB"
    allowed_paths:
      - "/workspaces/agent-feed/prod/agent_workspace/agent-ideas-agent/**"
      - "/workspaces/agent-feed/prod/agent_workspace/shared/**"
    forbidden_paths:
      - "/workspaces/agent-feed/src/**"
      - "/workspaces/agent-feed/api-server/**"
      - "/workspaces/agent-feed/frontend/**"
      - "/workspaces/agent-feed/prod/system_instructions/**"
  tool_permissions:
    allowed:
      - "Read"
      - "Write"
      - "Edit"
      - "MultiEdit"
      - "Glob"
      - "Grep"
      - "TodoWrite"
      - "Bash"
    forbidden:
      - "KillShell"
  resource_limits:
    max_memory: "256MB"
    max_cpu_percent: 30
    max_execution_time: "240s"
    max_concurrent_tasks: 2
  posting_rules:
    auto_post_outcomes: false
    post_threshold: "never"
    default_post_type: "reply"
  security:
    sandbox_enabled: true
    network_access: "api_only"
    file_operations: "workspace_only"
_metadata:
  created_at: "2025-10-17T03:18:31.828Z"
  updated_at: "2025-10-17T03:18:31.828Z"
  updated_by: "sparc-coder-agent"
  description: "System agent for production agent ecosystem expansion and planning"
checksum: "sha256:eeae2485723ec8b5347183b6f4331c8be6facb91b9a0cc75be3c69990a92d4cb"
