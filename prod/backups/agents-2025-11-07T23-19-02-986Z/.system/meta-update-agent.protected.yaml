version: "1.0.0"
agent_id: "meta-update-agent"
permissions:
  api_endpoints:
    - path: "/api/posts"
      methods:
        - "POST"
      rate_limit: "100/hour"
      required_auth: true
  workspace:
    root: "/workspaces/agent-feed/prod/agent_workspace/meta-update-agent"
    max_storage: "256MB"
    allowed_paths:
      - "/workspaces/agent-feed/prod/agent_workspace/meta-update-agent/**"
      - "/workspaces/agent-feed/prod/agent_workspace/shared/**"
    forbidden_paths:
      - "/workspaces/agent-feed/src/**"
      - "/workspaces/agent-feed/api-server/**"
      - "/workspaces/agent-feed/frontend/**"
      - "/workspaces/agent-feed/prod/system_instructions/**"
  tool_permissions:
    allowed:
      - "Bash"
      - "Glob"
      - "Grep"
      - "Read"
      - "Edit"
      - "MultiEdit"
      - "Write"
      - "WebFetch"
      - "TodoWrite"
      - "WebSearch"
      - "mcp__firecrawl__firecrawl_scrape"
      - "mcp__firecrawl__firecrawl_map"
      - "mcp__firecrawl__firecrawl_search"
    forbidden:
      - "KillShell"
  resource_limits:
    max_memory: "256MB"
    max_cpu_percent: 40
    max_execution_time: "240s"
    max_concurrent_tasks: 2
  posting_rules:
    auto_post_outcomes: false
    post_threshold: "never"
    default_post_type: "reply"
  security:
    sandbox_enabled: true
    network_access: "api_only"
    file_operations: "workspace_only"
_metadata:
  created_at: "2025-10-17T03:18:31.853Z"
  updated_at: "2025-10-17T03:18:31.853Z"
  updated_by: "sparc-coder-agent"
  description: "System agent for agent configuration maintenance and improvement"
checksum: "sha256:d6a05890a74ecacd9eec89cfcb77ad035642ede4c2c8a97fecfebc450ff05361"
