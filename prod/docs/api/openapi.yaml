                    minimum: 0
                    maximum: 1
                    default: 1.0
              minItems: 1
              maxItems: 10
        weight:
          type: number
          minimum: 0
          maximum: 1
        platforms:
          type: array
          items:
            type: string
            enum: [twitter, linkedin, instagram, facebook, youtube, tiktok, all]
          default: ["all"]
        content_types:
          type: array
          items:
            type: string
            enum: [text, image, video, link, poll, all]
          default: ["all"]
        active:
          type: boolean
          default: true

    EngagementPatternsResponse:
      type: object
      required:
        - patterns
        - analysis_period
        - confidence_level
      properties:
        patterns:
          type: array
          items:
            type: object
            properties:
              pattern_id:
                type: string
              type:
                type: string
                enum: [temporal, content_based, audience_based, platform_specific]
              description:
                type: string
              confidence:
                type: number
                minimum: 0
                maximum: 1
              impact_score:
                type: number
                minimum: 0
                maximum: 1
              frequency:
                type: integer
                description: Number of times pattern was observed
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    factor:
                      type: string
                    value:
                      type: string
                    correlation:
                      type: number
                      minimum: -1
                      maximum: 1
              recommendations:
                type: array
                items:
                  type: string
        temporal_insights:
          type: object
          properties:
            best_posting_times:
              type: array
              items:
                type: object
                properties:
                  day_of_week:
                    type: string
                  hour:
                    type: integer
                  engagement_multiplier:
                    type: number
                  confidence:
                    type: number
            posting_frequency:
              type: object
              properties:
                optimal_posts_per_day:
                  type: number
                optimal_interval_hours:
                  type: number
                weekend_adjustment:
                  type: number
        content_insights:
          type: object
          properties:
            high_performing_topics:
              type: array
              items:
                type: object
                properties:
                  topic:
                    type: string
                  engagement_lift:
                    type: number
                  sample_size:
                    type: integer
            content_format_preferences:
              type: array
              items:
                type: object
                properties:
                  format:
                    type: string
                  preference_score:
                    type: number
                  platforms:
                    type: array
                    items:
                      type: string
        analysis_period:
          type: object
          properties:
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
            sample_size:
              type: integer
        confidence_level:
          type: number
          minimum: 0
          maximum: 1
        last_updated:
          type: string
          format: date-time

    # System Monitoring Schemas
    SystemHealthResponse:
      type: object
      required:
        - status
        - components
        - timestamp
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        overall_score:
          type: number
          minimum: 0
          maximum: 1
        components:
          type: object
          properties:
            api_gateway:
              $ref: '#/components/schemas/ComponentHealth'
            database:
              $ref: '#/components/schemas/ComponentHealth'
            ai_services:
              $ref: '#/components/schemas/ComponentHealth'
            agent_coordination:
              $ref: '#/components/schemas/ComponentHealth'
            feed_processor:
              $ref: '#/components/schemas/ComponentHealth'
            content_analyzer:
              $ref: '#/components/schemas/ComponentHealth'
            cache:
              $ref: '#/components/schemas/ComponentHealth'
            queue_system:
              $ref: '#/components/schemas/ComponentHealth'
        system_metrics:
          type: object
          properties:
            uptime:
              type: integer
              description: System uptime in seconds
            requests_per_second:
              type: number
            error_rate:
              type: number
              minimum: 0
              maximum: 1
            average_response_time:
              type: number
              description: Average response time in milliseconds
        alerts:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum: [info, warning, error, critical]
              component:
                type: string
              message:
                type: string
              timestamp:
                type: string
                format: date-time
        timestamp:
          type: string
          format: date-time

    ComponentHealth:
      type: object
      required:
        - status
        - response_time
      properties:
        status:
          type: string
          enum: [up, down, degraded]
        response_time:
          type: number
          description: Response time in milliseconds
        uptime_percentage:
          type: number
          minimum: 0
          maximum: 100
        last_check:
          type: string
          format: date-time
        error_count:
          type: integer
          minimum: 0
        details:
          type: object
          properties:
            version:
              type: string
            dependencies:
              type: array
              items:
                type: string
            metrics:
              type: object
              additionalProperties:
                type: number

    SystemMetricsResponse:
      type: object
      required:
        - metrics
        - time_range
        - generated_at
      properties:
        metrics:
          type: object
          properties:
            system:
              type: object
              properties:
                cpu_usage:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      value:
                        type: number
                        minimum: 0
                        maximum: 100
                memory_usage:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      value:
                        type: number
                        minimum: 0
                        maximum: 100
                disk_usage:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      value:
                        type: number
                        minimum: 0
                        maximum: 100
                network_io:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      bytes_in:
                        type: integer
                      bytes_out:
                        type: integer
            api:
              type: object
              properties:
                request_rate:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      requests_per_second:
                        type: number
                response_time:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      p50:
                        type: number
                      p95:
                        type: number
                      p99:
                        type: number
                error_rate:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      error_percentage:
                        type: number
                        minimum: 0
                        maximum: 100
            agents:
              type: object
              properties:
                active_agents:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      count:
                        type: integer
                task_completion_rate:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      rate:
                        type: number
                        minimum: 0
                        maximum: 1
                average_task_duration:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time
                      duration_seconds:
                        type: number
        summary:
          type: object
          properties:
            peak_values:
              type: object
              additionalProperties:
                type: number
            average_values:
              type: object
              additionalProperties:
                type: number
            trend_analysis:
              type: array
              items:
                type: object
                properties:
                  metric:
                    type: string
                  trend:
                    type: string
                    enum: [increasing, decreasing, stable]
                  confidence:
                    type: number
                    minimum: 0
                    maximum: 1
        time_range:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        generated_at:
          type: string
          format: date-time

