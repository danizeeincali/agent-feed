openapi: 3.0.3
info:
  title: Distributed Posting Intelligence API
  version: 1.0.0
  description: |
    A comprehensive API for managing distributed posting intelligence, agent coordination, 
    feed optimization, and content management across multiple social platforms.
    
    ## Features
    - AI-powered content composition and quality analysis
    - Multi-agent coordination and task orchestration
    - Real-time feed analytics and optimization
    - Template and content management system
    - Performance monitoring and health checks
    
  contact:
    name: API Support
    url: https://github.com/ruvnet/agent-feed
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.agentfeed.com/v1
    description: Production server
  - url: https://staging-api.agentfeed.com/v1
    description: Staging server
  - url: http://localhost:3000/v1
    description: Development server

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:
  # Posting Intelligence APIs
  /api/posts/compose:
    post:
      tags:
        - Posting Intelligence
      summary: Compose intelligent post content
      description: |
        Generate or enhance post content using AI-powered composition algorithms.
        Supports multiple platforms and content types with quality optimization.
      operationId: composePosts
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostComposeRequest'
            examples:
              basic_compose:
                $ref: '#/components/examples/BasicComposeRequest'
              advanced_compose:
                $ref: '#/components/examples/AdvancedComposeRequest'
      responses:
        '200':
          description: Successfully composed post content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostComposeResponse'
              examples:
                success_response:
                  $ref: '#/components/examples/ComposeSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/posts/templates:
    get:
      tags:
        - Posting Intelligence
      summary: Retrieve post templates
      description: Get available post templates filtered by platform, category, or engagement metrics
      operationId: getPostTemplates
      parameters:
        - name: platform
          in: query
          description: Filter templates by social platform
          schema:
            type: string
            enum: [twitter, linkedin, instagram, facebook, youtube, tiktok]
        - name: category
          in: query
          description: Filter by content category
          schema:
            type: string
            enum: [tech, business, lifestyle, education, entertainment]
        - name: engagement_threshold
          in: query
          description: Minimum engagement score (0-1)
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: limit
          in: query
          description: Maximum number of templates to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of templates to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successfully retrieved templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostTemplatesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Posting Intelligence
      summary: Create new post template
      description: Create a new reusable post template with metadata and quality metrics
      operationId: createPostTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Template with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/posts/analyze-quality:
    post:
      tags:
        - Posting Intelligence
      summary: Analyze post content quality
      description: |
        Analyze post content for quality metrics including engagement potential,
        sentiment analysis, readability, and platform-specific optimization scores.
      operationId: analyzePostQuality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityAnalysisRequest'
      responses:
        '200':
          description: Quality analysis completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityAnalysisResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Agent Coordination APIs
  /api/agents/capabilities:
    get:
      tags:
        - Agent Coordination
      summary: Get agent capabilities
      description: Retrieve available agent capabilities and their current status
      operationId: getAgentCapabilities
      parameters:
        - name: agent_type
          in: query
          description: Filter by agent type
          schema:
            type: string
            enum: [researcher, coder, analyst, optimizer, coordinator, content-creator]
        - name: status
          in: query
          description: Filter by agent status
          schema:
            type: string
            enum: [active, idle, busy, offline]
      responses:
        '200':
          description: Agent capabilities retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCapabilitiesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/agents/coordinate:
    post:
      tags:
        - Agent Coordination
      summary: Coordinate multi-agent tasks
      description: |
        Orchestrate complex tasks across multiple specialized agents with
        dependency management and parallel execution capabilities.
      operationId: coordinateAgents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCoordinationRequest'
      responses:
        '202':
          description: Task coordination initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCoordinationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Insufficient agent capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/agents/status:
    get:
      tags:
        - Agent Coordination
      summary: Get agent status
      description: Monitor real-time status of all agents including performance metrics
      operationId: getAgentStatus
      parameters:
        - name: agent_id
          in: query
          description: Specific agent ID to monitor
          schema:
            type: string
        - name: include_metrics
          in: query
          description: Include performance metrics
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Agent status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Feed Intelligence APIs
  /api/feed/analytics:
    get:
      tags:
        - Feed Intelligence
      summary: Get feed analytics
      description: Retrieve comprehensive feed performance analytics and insights
      operationId: getFeedAnalytics
      parameters:
        - name: time_range
          in: query
          description: Analytics time range
          schema:
            type: string
            enum: [1h, 24h, 7d, 30d, 90d]
            default: 24h
        - name: platform
          in: query
          description: Filter by platform
          schema:
            type: string
            enum: [twitter, linkedin, instagram, facebook, youtube, tiktok]
        - name: metrics
          in: query
          description: Specific metrics to include
          schema:
            type: array
            items:
              type: string
              enum: [engagement, reach, impressions, clicks, shares, comments]
        - name: granularity
          in: query
          description: Data granularity
          schema:
            type: string
            enum: [hourly, daily, weekly]
            default: daily
      responses:
        '200':
          description: Analytics data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedAnalyticsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/feed/optimize:
    post:
      tags:
        - Feed Intelligence
      summary: Optimize feed performance
      description: |
        Apply AI-driven optimization strategies to improve feed performance
        including timing, content mix, and audience targeting.
      operationId: optimizeFeed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedOptimizationRequest'
      responses:
        '200':
          description: Optimization recommendations generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedOptimizationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/feed/health:
    get:
      tags:
        - Feed Intelligence
      summary: Get feed health status
      description: Monitor overall feed health including engagement trends and anomaly detection
      operationId: getFeedHealth
      responses:
        '200':
          description: Feed health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedHealthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Content Management APIs
  /api/content/templates:
    get:
      tags:
        - Content Management
      summary: List content templates
      description: Retrieve paginated list of content templates with filtering
      operationId: listContentTemplates
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
        - name: search
          in: query
          description: Search templates by name or tags
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order
          schema:
            type: string
            enum: [name, created_at, updated_at, engagement_score]
            default: created_at
        - name: order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Content Management
      summary: Create content template
      description: Create a new content template with validation and metadata
      operationId: createContentTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContentTemplateRequest'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Template name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/content/templates/{templateId}:
    get:
      tags:
        - Content Management
      summary: Get content template by ID
      description: Retrieve a specific content template with full details
      operationId: getContentTemplate
      parameters:
        - name: templateId
          in: path
          required: true
          description: Template unique identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentTemplate'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - Content Management
      summary: Update content template
      description: Update an existing content template
      operationId: updateContentTemplate
      parameters:
        - name: templateId
          in: path
          required: true
          description: Template unique identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContentTemplateRequest'
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Content Management
      summary: Delete content template
      description: Delete a content template (soft delete with retention period)
      operationId: deleteContentTemplate
      parameters:
        - name: templateId
          in: path
          required: true
          description: Template unique identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Template deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/content/quality-rules:
    get:
      tags:
        - Content Management
      summary: Get content quality rules
      description: Retrieve content quality validation rules and scoring criteria
      operationId: getQualityRules
      parameters:
        - name: platform
          in: query
          description: Platform-specific rules
          schema:
            type: string
            enum: [twitter, linkedin, instagram, facebook, youtube, tiktok]
        - name: content_type
          in: query
          description: Content type rules
          schema:
            type: string
            enum: [text, image, video, link, poll]
      responses:
        '200':
          description: Quality rules retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityRulesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Content Management
      summary: Create quality rule
      description: Create new content quality validation rule
      operationId: createQualityRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQualityRuleRequest'
      responses:
        '201':
          description: Quality rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityRule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/content/engagement-patterns:
    get:
      tags:
        - Content Management
      summary: Get engagement patterns
      description: Retrieve learned engagement patterns and optimization insights
      operationId: getEngagementPatterns
      parameters:
        - name: time_range
          in: query
          description: Pattern analysis time range
          schema:
            type: string
            enum: [7d, 30d, 90d, 6m, 1y]
            default: 30d
        - name: confidence_threshold
          in: query
          description: Minimum confidence score for patterns
          schema:
            type: number
            minimum: 0
            maximum: 1
            default: 0.7
      responses:
        '200':
          description: Engagement patterns retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementPatternsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Performance Monitoring
  /api/system/health:
    get:
      tags:
        - System Monitoring
      summary: System health check
      description: Comprehensive system health status including all subsystems
      operationId: getSystemHealth
      responses:
        '200':
          description: System health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'
        '503':
          description: System unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealthResponse'

  /api/system/metrics:
    get:
      tags:
        - System Monitoring
      summary: Get performance metrics
      description: Retrieve detailed performance metrics for monitoring and alerting
      operationId: getSystemMetrics
      parameters:
        - name: time_range
          in: query
          description: Metrics time range
          schema:
            type: string
            enum: [5m, 15m, 1h, 6h, 24h]
            default: 1h
        - name: metrics
          in: query
          description: Specific metrics to retrieve
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [cpu, memory, disk, network, api_latency, error_rate, throughput]
      responses:
        '200':
          description: Metrics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemMetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for API authentication
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for service-to-service authentication

  parameters:
    PaginationLimit:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    
    PaginationOffset:
      name: offset
      in: query
      description: Number of items to skip
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation_error:
              summary: Validation error
              value:
                error:
                  code: VALIDATION_ERROR
                  message: Invalid request parameters
                  details:
                    - field: content
                      message: Content is required
                    - field: platform
                      message: Invalid platform value
                timestamp: "2024-01-15T10:30:00Z"
                request_id: "req_123456789"

    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing_token:
              summary: Missing authentication token
              value:
                error:
                  code: UNAUTHORIZED
                  message: Authentication token required
                  details: []
                timestamp: "2024-01-15T10:30:00Z"
                request_id: "req_123456789"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            template_not_found:
              summary: Template not found
              value:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: Template with ID 'template_123' not found
                  details: []
                timestamp: "2024-01-15T10:30:00Z"
                request_id: "req_123456789"

    RateLimited:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          description: Total rate limit
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Remaining requests
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Rate limit reset time (Unix timestamp)
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            rate_limit_exceeded:
              summary: Rate limit exceeded
              value:
                error:
                  code: RATE_LIMIT_EXCEEDED
                  message: API rate limit exceeded. Try again in 60 seconds.
                  details:
                    - retry_after: 60
                timestamp: "2024-01-15T10:30:00Z"
                request_id: "req_123456789"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            server_error:
              summary: Internal server error
              value:
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: An unexpected error occurred
                  details: []
                timestamp: "2024-01-15T10:30:00Z"
                request_id: "req_123456789"

  schemas:
    # Common schemas
    ErrorResponse:
      type: object
      required:
        - error
        - timestamp
        - request_id
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code for programmatic handling
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - RESOURCE_NOT_FOUND
                - RATE_LIMIT_EXCEEDED
                - INTERNAL_SERVER_ERROR
                - SERVICE_UNAVAILABLE
            message:
              type: string
              description: Human-readable error message
            details:
              type: array
              description: Additional error details
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                  code:
                    type: string
        timestamp:
          type: string
          format: date-time
          description: Error occurrence timestamp
        request_id:
          type: string
          description: Unique request identifier for debugging

    PaginationMeta:
      type: object
      required:
        - total
        - limit
        - offset
        - has_more
      properties:
        total:
          type: integer
          minimum: 0
          description: Total number of items
        limit:
          type: integer
          minimum: 1
          description: Items per page
        offset:
          type: integer
          minimum: 0
          description: Items skipped
        has_more:
          type: boolean
          description: Whether more items are available

    # Posting Intelligence Schemas
    PostComposeRequest:
      type: object
      required:
        - content_type
        - platform
      properties:
        content_type:
          type: string
          enum: [original, enhance, template_based, ai_generated]
          description: Type of content composition
        platform:
          type: string
          enum: [twitter, linkedin, instagram, facebook, youtube, tiktok]
          description: Target social media platform
        input_content:
          type: string
          description: Base content to enhance or compose from
          maxLength: 10000
        template_id:
          type: string
          format: uuid
          description: Template ID for template-based composition
        parameters:
          type: object
          description: Composition parameters
          properties:
            tone:
              type: string
              enum: [professional, casual, humorous, inspirational, educational]
            target_audience:
              type: string
              enum: [general, business, technical, creative, academic]
            engagement_goal:
              type: string
              enum: [likes, shares, comments, clicks, reach]
            hashtags:
              type: boolean
              default: true
              description: Include relevant hashtags
            max_length:
              type: integer
              minimum: 1
              maximum: 5000
              description: Maximum content length
            include_cta:
              type: boolean
              default: false
              description: Include call-to-action
        optimization_level:
          type: string
          enum: [basic, standard, advanced]
          default: standard
          description: Level of AI optimization to apply

    PostComposeResponse:
      type: object
      required:
        - content
        - metadata
        - quality_score
      properties:
        content:
          type: string
          description: Generated or enhanced content
        alternatives:
          type: array
          description: Alternative content variations
          items:
            type: object
            properties:
              content:
                type: string
              score:
                type: number
                minimum: 0
                maximum: 1
              focus:
                type: string
        metadata:
          type: object
          properties:
            platform_optimized:
              type: string
            character_count:
              type: integer
            word_count:
              type: integer
            hashtags:
              type: array
              items:
                type: string
            estimated_reach:
              type: integer
            optimal_posting_time:
              type: string
              format: date-time
        quality_score:
          type: number
          minimum: 0
          maximum: 1
          description: Overall content quality score
        engagement_prediction:
          type: object
          properties:
            likes:
              type: number
            shares:
              type: number
            comments:
              type: number
            click_through_rate:
              type: number
              minimum: 0
              maximum: 1

    PostTemplatesResponse:
      type: object
      required:
        - templates
        - pagination
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/PostTemplate'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PostTemplate:
      type: object
      required:
        - id
        - name
        - content
        - platform
        - category
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique template identifier
        name:
          type: string
          description: Template name
        description:
          type: string
          description: Template description
        content:
          type: string
          description: Template content with variables
        platform:
          type: string
          enum: [twitter, linkedin, instagram, facebook, youtube, tiktok, multi]
        category:
          type: string
          enum: [tech, business, lifestyle, education, entertainment, marketing]
        variables:
          type: array
          description: Template variables
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
                enum: [text, number, date, boolean, enum]
              required:
                type: boolean
              default_value:
                type: string
              options:
                type: array
                items:
                  type: string
        engagement_metrics:
          type: object
          properties:
            average_score:
              type: number
