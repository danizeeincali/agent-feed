      type: number
      minimum: 0
      maximum: 1
      example: 0.96
    components:
      type: object
      properties:
        api_gateway:
          $ref: '#/components/schemas/ComponentHealth'
        database:
          $ref: '#/components/schemas/ComponentHealth'
        ai_services:
          $ref: '#/components/schemas/ComponentHealth'
        agent_coordination:
          $ref: '#/components/schemas/ComponentHealth'
        feed_processor:
          $ref: '#/components/schemas/ComponentHealth'
        content_analyzer:
