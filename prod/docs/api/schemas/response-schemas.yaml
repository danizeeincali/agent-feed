ComponentHealth:
  type: object
  required:
    - status
    - response_time
  properties:
    status:
      type: string
      enum: [up, down, degraded, maintenance]
      example: "up"
    response_time:
      type: number
      description: Response time in milliseconds
      example: 145.2
    uptime_percentage:
      type: number
      minimum: 0
      maximum: 100
      example: 99.98
    last_check:
      type: string
      format: date-time
      example: "2024-01-15T16:00:00Z"
    error_count:
      type: integer
      minimum: 0
      example: 0
    error_rate:
      type: number
      minimum: 0
      maximum: 1
      example: 0.001
    health_score:
      type: number
      minimum: 0
      maximum: 1
      example: 0.98
    details:
      type: object
      properties:
        version:
          type: string
          example: "v2.1.0"
        region:
          type: string
          example: "us-east-1"
        instance_count:
          type: integer
          example: 3
        healthy_instances:
          type: integer
          example: 3
        dependencies:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: [healthy, unhealthy, unknown]
              response_time:
                type: number
        metrics:
          type: object
          additionalProperties:
            type: number
          example:
            cpu_usage: 45.2
            memory_usage: 68.5
            active_connections: 125
            queue_depth: 0
    recent_incidents:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          title:
            type: string
          occurred_at:
            type: string
            format: date-time
          resolved_at:
            type: string
            format: date-time
          duration_minutes:
            type: integer
          severity:
            type: string
            enum: [low, medium, high, critical]