            average_24h:
              type: number
              minimum: 0
              maximum: 100
              example: 52.1
            peak_24h:
              type: number
              minimum: 0
              maximum: 100
              example: 78.9
        memory_usage:
          type: object
          properties:
            current:
              type: number
              minimum: 0
              maximum: 100
              example: 68.5
