# CI/CD Pipeline for TDD London School Test Suite
# Comprehensive testing with Jest, Playwright, and Performance Testing

name: Test Suite - TDD London School

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run full test suite daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  CACHE_VERSION: 'v1'

jobs:
  # Unit Tests - Fast feedback loop
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        node-version: [16, 18, 20]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit
          
      - name: Run unit tests
        run: |
          npm run test:unit -- --coverage --watchAll=false
        env:
          NODE_ENV: test
          CI: true
          
      - name: Upload unit test coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./tests/coverage/lcov.info
          flags: unit-tests
          name: unit-tests-node-${{ matrix.node-version }}
          
      - name: Upload unit test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results-node-${{ matrix.node-version }}
          path: |
            tests/coverage/junit.xml
            tests/coverage/html-report/

  # Integration Tests - Service coordination
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: posting_intelligence_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Setup test database
        run: |
          npm run db:migrate:test
          npm run db:seed:test
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/posting_intelligence_test
          
      - name: Run integration tests
        run: |
          npm run test:integration -- --coverage --watchAll=false
        env:
          NODE_ENV: integration-test
          CI: true
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/posting_intelligence_test
          
      - name: Upload integration test coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./tests/coverage/integration/lcov.info
          flags: integration-tests
          name: integration-tests
          
      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: |
            tests/coverage/integration/
            tests/coverage/integration-report/

  # E2E Tests - User workflows
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: integration-tests
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        
      - name: Build application for testing
        run: |
          npm run build:test
        env:
          NODE_ENV: test
          
      - name: Run E2E tests
        run: |
          npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          
      - name: Upload E2E test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-results-${{ matrix.browser }}
          path: |
            tests/coverage/playwright-report/
            tests/coverage/playwright-artifacts/
            tests/coverage/playwright-results.xml
            
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: e2e-failure-screenshots-${{ matrix.browser }}
          path: tests/coverage/playwright-artifacts/

  # Performance Tests - Load and stress testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: integration-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Run performance tests
        run: |
          npm run test:performance
        env:
          NODE_ENV: test
          CI: true
          PERFORMANCE_TARGET_RPS: 100
          
      - name: Upload performance test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results
          path: |
            tests/coverage/performance-report.json
            tests/coverage/performance-benchmarks.json
            
      - name: Performance regression check
        run: |
          npm run performance:check-regression
        env:
          BASELINE_BRANCH: main

  # Quality Gates - Aggregate results and enforce quality
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, performance-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all test artifacts
        uses: actions/download-artifact@v3
        with:
          path: test-results/
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Aggregate test results
        run: |
          npm run test:aggregate-results
        env:
          RESULTS_PATH: test-results/
          
      - name: Check coverage thresholds
        run: |
          npm run test:check-coverage
        
      - name: Check performance benchmarks
        run: |
          npm run test:check-performance
          
      - name: Generate quality report
        run: |
          npm run test:quality-report
          
      - name: Upload aggregated results
        uses: actions/upload-artifact@v3
        with:
          name: quality-report
          path: |
            tests/coverage/quality-report.html
            tests/coverage/quality-metrics.json
            
      - name: Comment PR with quality metrics
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const qualityMetrics = JSON.parse(fs.readFileSync('tests/coverage/quality-metrics.json', 'utf8'));
            
            const comment = `## Test Suite Results\n\n` +
              `### Coverage\n` +
              `- Unit Tests: ${qualityMetrics.unitCoverage}%\n` +
              `- Integration Tests: ${qualityMetrics.integrationCoverage}%\n` +
              `- Overall Coverage: ${qualityMetrics.overallCoverage}%\n\n` +
              `### Performance\n` +
              `- Throughput: ${qualityMetrics.throughput} posts/minute\n` +
              `- Average Response Time: ${qualityMetrics.avgResponseTime}ms\n` +
              `- P95 Response Time: ${qualityMetrics.p95ResponseTime}ms\n\n` +
              `### Quality Gates\n` +
              `- All Tests: ${qualityMetrics.allTestsPassing ? '✅ PASS' : '❌ FAIL'}\n` +
              `- Coverage Threshold: ${qualityMetrics.coverageThresholdMet ? '✅ PASS' : '❌ FAIL'}\n` +
              `- Performance Baseline: ${qualityMetrics.performanceBaselineMet ? '✅ PASS' : '❌ FAIL'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Security and Compliance
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality-gates
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run security audit
        run: npm audit --audit-level=high
        
      - name: Run dependency vulnerability check
        uses: actions/dependency-review-action@v3
        if: github.event_name == 'pull_request'
        
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: javascript

  # Deployment readiness
  deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [quality-gates, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check deployment criteria
        run: |
          echo "All quality gates passed ✅"
          echo "Security scan completed ✅"
          echo "Ready for deployment 🚀"
          
      - name: Trigger deployment
        if: success()
        run: |
          echo "Deployment would be triggered here"
          # Add actual deployment trigger here
