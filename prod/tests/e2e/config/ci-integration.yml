# CI/CD Integration Configuration for Playwright E2E Tests
# Supports GitHub Actions, GitLab CI, Jenkins, and other CI systems

# GitHub Actions Integration
name: E2E Tests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly tests at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1/4, 2/4, 3/4, 4/4]
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Setup test environment
      run: |
        cp .env.test .env
        npm run db:setup:test
        npm run services:start:test
    
    - name: Run Playwright tests
      env:
        CI: true
        BASE_URL: http://localhost:3000
        TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        PLAYWRIGHT_SHARD: ${{ matrix.shard }}
      run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}-${{ matrix.shard }}
        path: test-results/
        retention-days: 30
    
    - name: Upload HTML report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: html-report-${{ matrix.browser }}-${{ matrix.shard }}
        path: test-results/html-report/
        retention-days: 30

  performance-tests:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    needs: e2e-tests
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers  
      run: npx playwright install --with-deps chromium
    
    - name: Setup performance test environment
      run: |
        cp .env.performance .env
        npm run db:setup:performance
        npm run services:start:performance
    
    - name: Run Performance Tests
      env:
        CI: true
        BASE_URL: http://localhost:3000
        TEST_DATABASE_URL: ${{ secrets.PERF_DATABASE_URL }}
      run: npx playwright test --project=performance
    
    - name: Generate Performance Report
      run: |
        npm run perf:report
        npm run perf:compare-baseline
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-report
        path: test-results/performance/
        retention-days: 90

  visual-tests:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    
    - name: Setup visual test environment
      run: |
        cp .env.visual .env
        npm run db:setup:visual
    
    - name: Run Visual Regression Tests
      env:
        CI: true
        BASE_URL: http://localhost:3000
      run: npx playwright test --project=visual-regression
    
    - name: Upload visual test results
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: visual-diff-report
        path: test-results/visual/
        retention-days: 30

  mobile-tests:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        device: [mobile-chrome, mobile-safari]
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run Mobile Tests
      env:
        CI: true
        BASE_URL: http://localhost:3000
      run: npx playwright test --project=${{ matrix.device }}
    
    - name: Upload mobile test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: mobile-report-${{ matrix.device }}
        path: test-results/
        retention-days: 30

  test-report:
    needs: [e2e-tests, performance-tests, visual-tests, mobile-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Merge test reports
      run: |
        npm ci
        npm run test:merge-reports
    
    - name: Generate consolidated report
      run: npm run test:consolidated-report
    
    - name: Upload consolidated report
      uses: actions/upload-artifact@v3
      with:
        name: consolidated-test-report
        path: test-results/consolidated/
        retention-days: 90
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = 'test-results/consolidated/summary.json';
          
          if (fs.existsSync(path)) {
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            
            const comment = `## 🧪 E2E Test Results
            
            ### Summary
            - **Total Tests:** ${summary.totalTests}
            - **Passed:** ${summary.passed} ✅
            - **Failed:** ${summary.failed} ❌
            - **Skipped:** ${summary.skipped} ⏭️
            - **Duration:** ${Math.round(summary.duration / 1000)}s
            
            ### Performance Metrics
            - **Average Page Load:** ${summary.performance?.avgPageLoad || 'N/A'}ms
            - **Memory Usage:** ${summary.performance?.avgMemory || 'N/A'}MB
            - **Error Rate:** ${summary.performance?.errorRate || 'N/A'}%
            
            ### Coverage
            - **Workflow Tests:** ${summary.coverage?.workflows || 'N/A'}%
            - **Coordination Tests:** ${summary.coverage?.coordination || 'N/A'}%
            - **Visual Tests:** ${summary.coverage?.visual || 'N/A'}%
            
            [View Full Report](${summary.reportUrl || '#'})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

# Environment-specific configurations
env_configurations:
  test:
    NODE_ENV: test
    BASE_URL: http://localhost:3000
    API_BASE_URL: http://localhost:3000/api
    TEST_DATABASE_URL: sqlite:memory:
    LOG_LEVEL: warn
    MOCK_SERVICES: true
    
  performance:
    NODE_ENV: performance
    BASE_URL: http://localhost:3000
    TEST_DATABASE_URL: postgresql://test:test@localhost:5432/perf_test
    LOG_LEVEL: error
    PERFORMANCE_MONITORING: true
    METRICS_COLLECTION: true
    
  visual:
    NODE_ENV: visual
    BASE_URL: http://localhost:3000
    VISUAL_TESTING: true
    SCREENSHOT_THRESHOLD: 0.3
    VISUAL_BASELINE_DIR: test-results/visual/baseline

# Test execution strategies
execution_strategies:
  parallel:
    workers: 4
    retries: 2
    timeout: 60000
    
  sequential:
    workers: 1
    retries: 1
    timeout: 120000
    
  performance:
    workers: 2
    retries: 0
    timeout: 300000
    
  visual:
    workers: 1
    retries: 0
    timeout: 60000

# Reporting configuration
reporting:
  formats:
    - html
    - json
    - junit
    - allure
  
  destinations:
    - local: test-results/
    - s3: s3://test-reports-bucket/
    - webhook: https://api.example.com/test-reports
  
  notifications:
    slack:
      webhook: ${{ secrets.SLACK_WEBHOOK }}
      channels: ['#qa', '#dev-alerts']
    
    email:
      recipients: ['qa-team@company.com']
      on_failure: true
      on_success: false

# Quality gates
quality_gates:
  minimum_pass_rate: 95
  maximum_duration: 3600 # 1 hour
  performance_thresholds:
    page_load_time: 5000 # 5 seconds
    memory_usage: 200 # 200MB
    error_rate: 5 # 5%
  
  visual_regression:
    max_pixel_diff: 0.3
    max_layout_shift: 0.1
  
  coverage_requirements:
    workflow_coverage: 90
    coordination_coverage: 85
    error_scenario_coverage: 80

# Cleanup configuration
cleanup:
  test_data:
    retention_days: 7
    auto_cleanup: true
  
  artifacts:
    retention_days: 30
    compress: true
  
  screenshots:
    keep_on_success: false
    keep_on_failure: true
    retention_days: 14

# Integration hooks
hooks:
  pre_test:
    - npm run lint:e2e
    - npm run typecheck:e2e
    - npm run db:migrate:test
  
  post_test:
    - npm run coverage:merge
    - npm run reports:generate
    - npm run cleanup:test-data
  
  on_failure:
    - npm run debug:collect-logs
    - npm run debug:create-issue
  
  on_success:
    - npm run metrics:update-baseline
    - npm run reports:publish