<!DOCTYPE html>
<html>
<head>
    <title>Debug Page</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
    <h1>Debug Test Page</h1>
    <div id="root"></div>

    <script>
        console.log('Debug page: Script starting...');

        // Test 1: Basic DOM manipulation
        const root = document.getElementById('root');
        root.innerHTML = '<h2 style="color: green;">✅ DOM Manipulation Works!</h2>';

        // Test 2: React rendering
        try {
            const { createElement } = React;
            const { createRoot } = ReactDOM;

            const App = () => {
                return createElement('div', {
                    style: { padding: '20px', background: '#3b82f6', color: 'white' }
                }, [
                    createElement('h3', {key: '1'}, '✅ React is Working!'),
                    createElement('p', {key: '2'}, 'Time: ' + new Date().toLocaleTimeString()),
                    createElement('button', {
                        key: '3',
                        onClick: () => alert('Button clicked!')
                    }, 'Test Button')
                ]);
            };

            const reactRoot = createRoot(root);
            reactRoot.render(createElement(App));

            console.log('Debug page: React rendered successfully');
        } catch (error) {
            console.error('Debug page: React error:', error);
            root.innerHTML += '<div style="color: red;">React Error: ' + error + '</div>';
        }
    </script>
</body>
</html>
