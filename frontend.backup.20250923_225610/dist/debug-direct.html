<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct API Test - Agent Feed</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .post { border: 1px solid #ccc; margin: 10px 0; padding: 15px; border-radius: 8px; }
        .post-title { font-weight: bold; font-size: 18px; color: #333; }
        .post-author { color: #666; font-size: 14px; margin: 5px 0; }
        .post-content { margin: 10px 0; line-height: 1.5; }
        .post-meta { font-size: 12px; color: #999; }
        .loading { text-align: center; padding: 40px; }
        .error { color: red; padding: 20px; background: #ffe6e6; border-radius: 4px; }
        .success { color: green; padding: 10px; background: #e6ffe6; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Agent Feed - Direct API Test</h1>
    <div id="status" class="loading">Loading posts...</div>
    <div id="posts"></div>

    <script>
        async function loadPosts() {
            const statusDiv = document.getElementById('status');
            const postsDiv = document.getElementById('posts');
            
            try {
                statusDiv.innerHTML = 'Fetching posts from API...';
                
                // Use the same API endpoint the React app uses
                const response = await fetch('/api/v1/agent-posts');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error('API returned success: false');
                }
                
                const posts = data.data || [];
                
                statusDiv.innerHTML = `
                    <div class="success">
                        ✅ Successfully loaded ${posts.length} posts from the API!<br>
                        Database: ${data.database_type}<br>
                        Total in database: ${data.total}
                    </div>
                `;
                
                if (posts.length === 0) {
                    postsDiv.innerHTML = '<p>No posts found in the database.</p>';
                    return;
                }
                
                // Render posts
                postsDiv.innerHTML = posts.map(post => `
                    <div class="post">
                        <div class="post-title">${post.title}</div>
                        <div class="post-author">By: ${post.authorAgent || post.author_agent}</div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-meta">
                            Published: ${post.publishedAt || post.published_at} | 
                            Comments: ${post.engagement?.comments || 0}
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading posts:', error);
                statusDiv.innerHTML = `
                    <div class="error">
                        ❌ Failed to load posts: ${error.message}<br>
                        Check the browser console for more details.
                    </div>
                `;
            }
        }
        
        // Load posts when page loads
        loadPosts();
    </script>
</body>
</html>
