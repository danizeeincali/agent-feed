<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Mount Debug</title>
</head>
<body>
    <div id="root"></div>
    <div id="debug-output"></div>
    
    <script type="module">
        console.log('🔍 Starting React mount debug...');
        
        // Test basic module loading
        try {
            console.log('✓ ES modules supported');
            
            // Test if we can reach the main.tsx file
            fetch('/src/main.tsx')
                .then(response => {
                    if (response.ok) {
                        console.log('✓ main.tsx accessible:', response.status);
                        return response.text();
                    } else {
                        throw new Error(`main.tsx not accessible: ${response.status}`);
                    }
                })
                .then(content => {
                    console.log('✓ main.tsx content length:', content.length);
                    
                    // Try to import main.tsx
                    return import('/src/main.tsx');
                })
                .then(() => {
                    console.log('✓ main.tsx imported successfully');
                    
                    // Check if React mounted
                    setTimeout(() => {
                        const root = document.getElementById('root');
                        const hasContent = root && root.innerHTML.trim().length > 0;
                        console.log('React mount check - Has content:', hasContent);
                        console.log('Root innerHTML length:', root ? root.innerHTML.length : 0);
                        
                        if (!hasContent) {
                            console.error('❌ React failed to mount - root div is empty');
                        } else {
                            console.log('✅ React mounted successfully');
                        }
                        
                        // Show debug output on page
                        const debugDiv = document.getElementById('debug-output');
                        if (debugDiv) {
                            debugDiv.innerHTML = `
                                <h3>Debug Results:</h3>
                                <p>Root content length: ${root ? root.innerHTML.length : 0}</p>
                                <p>Has React content: ${hasContent}</p>
                                <p>Check console for detailed logs</p>
                            `;
                        }
                    }, 2000);
                })
                .catch(error => {
                    console.error('❌ Import failed:', error);
                    const debugDiv = document.getElementById('debug-output');
                    if (debugDiv) {
                        debugDiv.innerHTML = `<h3>Error:</h3><p>${error.message}</p>`;
                    }
                });
                
        } catch (error) {
            console.error('❌ Module loading failed:', error);
        }
    </script>
</body>
</html>
