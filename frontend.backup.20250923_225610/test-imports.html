<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Import Test</title>
  </head>
  <body>
    <h1>Testing TokenAnalyticsDashboard Imports</h1>
    <div id="output">
      <p>Check browser console for test results...</p>
    </div>

    <script type="module">
      import { testTokenAnalyticsImport } from '/src/simple-test.tsx';

      document.addEventListener('DOMContentLoaded', async () => {
        const output = document.getElementById('output');

        try {
          const success = await testTokenAnalyticsImport();
          if (success) {
            output.innerHTML = '<p style="color: green;">✅ All imports successful! TokenAnalyticsDashboard should work.</p>';
          } else {
            output.innerHTML = '<p style="color: red;">❌ Import test failed. Check console for details.</p>';
          }
        } catch (error) {
          output.innerHTML = `<p style="color: red;">❌ Test error: ${error.message}</p>`;
          console.error('Test error:', error);
        }
      });
    </script>
  </body>
</html>
