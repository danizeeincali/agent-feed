<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal React Test - Debug White Screen</title>
    <style>
        body { font-family: system-ui; padding: 20px; }
        .debug { background: #f5f5f5; padding: 10px; margin: 10px 0; border-left: 4px solid #007acc; }
        .error { background: #ffebee; border-left-color: #f44336; color: #d32f2f; }
        .success { background: #e8f5e8; border-left-color: #4caf50; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>🔍 React White Screen Debug Test</h1>
    
    <div id="debug-log">
        <div class="debug">Starting diagnosis...</div>
    </div>
    
    <div id="root">
        <div class="debug">React mount target (should be replaced)</div>
    </div>
    
    <script>
        const log = (message, type = 'debug') => {
            console.log(message);
            const div = document.createElement('div');
            div.className = `debug ${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            document.getElementById('debug-log').appendChild(div);
        };
        
        log('✅ Basic JavaScript execution working');
        log('✅ DOM manipulation working');
        
        // Test if we can access the Vite dev server
        fetch('http://localhost:5173/src/main.tsx')
            .then(response => {
                if (response.ok) {
                    log('✅ Vite dev server responding', 'success');
                    return response.text();
                } else {
                    log(`❌ Vite server error: ${response.status}`, 'error');
                }
            })
            .then(code => {
                if (code) {
                    log('✅ main.tsx code received');
                    // Try to load React from Vite
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.innerHTML = `
                        try {
                            import React from 'http://localhost:5173/node_modules/.vite/deps/react.js?v=45f8d52c';
                            import ReactDOM from 'http://localhost:5173/node_modules/.vite/deps/react-dom_client.js?v=820c1cbf';
                            
                            console.log('✅ React imported successfully');
                            console.log('React version:', React.version);
                            
                            const root = ReactDOM.createRoot(document.getElementById('root'));
                            root.render(React.createElement('div', {style: {color: 'green', padding: '20px', border: '2px solid green'}}, '🎉 React is working! The white screen is caused by a component error, not React itself.'));
                            
                        } catch (error) {
                            console.error('❌ React import/mount failed:', error);
                            document.getElementById('debug-log').innerHTML += '<div class="debug error">React failed: ' + error.message + '</div>';
                        }
                    `;
                    document.head.appendChild(script);
                }
            })
            .catch(error => {
                log(`❌ Failed to fetch main.tsx: ${error.message}`, 'error');
            });
    </script>
</body>
</html>
