<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Screen Debug Test</title>
</head>
<body>
    <div id="root">Loading...</div>
    <script>
        console.log('Basic HTML loaded');
        
        // Test if we can reach the Vite server
        fetch('http://localhost:5173/src/main.tsx')
            .then(response => {
                console.log('Vite response status:', response.status);
                return response.text();
            })
            .then(code => {
                console.log('Main.tsx length:', code.length);
                console.log('Contains React import:', code.includes('React'));
            })
            .catch(error => {
                console.error('Failed to load from Vite:', error);
            });
            
        // Test if we can reach the backend
        fetch('http://localhost:3000/')
            .then(response => {
                console.log('Backend response status:', response.status);
                return response.text();
            })
            .then(html => {
                console.log('Backend HTML length:', html.length);
                console.log('Contains root div:', html.includes('id="root"'));
            })
            .catch(error => {
                console.error('Failed to load from backend:', error);
            });
    </script>
</body>
</html>
