<!DOCTYPE html>
<html>
<head>
    <title>Mock API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>Mock API Test</h1>
    <div id="test-results"></div>
    
    <script>
        const results = document.getElementById('test-results');
        
        function addResult(message, type = 'pending') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
            return div;
        }
        
        async function testApi() {
            const test1 = addResult('Testing /api/v1/agent-posts...');
            const test2 = addResult('Testing /api/v1/claude-live/prod/agents...');
            const test3 = addResult('Testing /api/v1/claude-live/prod/activities...');
            
            try {
                // Test agent posts
                const response1 = await fetch('/api/v1/agent-posts');
                const data1 = await response1.json();
                if (data1.success && data1.data.length > 0) {
                    test1.textContent = `✅ Agent posts: ${data1.data.length} posts retrieved`;
                    test1.className = 'test-result success';
                } else {
                    test1.textContent = '❌ Agent posts: Invalid response';
                    test1.className = 'test-result error';
                }
                
                // Test agents
                const response2 = await fetch('/api/v1/claude-live/prod/agents');
                const data2 = await response2.json();
                if (data2.success && data2.agents.length > 0) {
                    test2.textContent = `✅ Agents: ${data2.agents.length} agents retrieved`;
                    test2.className = 'test-result success';
                } else {
                    test2.textContent = '❌ Agents: Invalid response';
                    test2.className = 'test-result error';
                }
                
                // Test activities
                const response3 = await fetch('/api/v1/claude-live/prod/activities');
                const data3 = await response3.json();
                if (data3.success && data3.activities.length > 0) {
                    test3.textContent = `✅ Activities: ${data3.activities.length} activities retrieved`;
                    test3.className = 'test-result success';
                } else {
                    test3.textContent = '❌ Activities: Invalid response';
                    test3.className = 'test-result error';
                }
                
                addResult('🎉 Mock API is working! Check the main app at http://localhost:3001/', 'success');
                
            } catch (error) {
                addResult(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        // Run tests
        testApi();
    </script>
</body>
</html>
