<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Test</title>
</head>
<body>
    <h1>Testing Frontend Render</h1>
    <iframe src="http://localhost:3000" width="100%" height="600" style="border: 2px solid #ccc;"></iframe>
    <h2>SimpleLauncher Route</h2>
    <iframe src="http://localhost:3000/simple-launcher" width="100%" height="600" style="border: 2px solid #ccc;"></iframe>
    
    <script>
        // Check if iframes load
        window.addEventListener('load', () => {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach((iframe, index) => {
                iframe.addEventListener('load', () => {
                    console.log(`Iframe ${index + 1} loaded successfully`);
                });
                iframe.addEventListener('error', (e) => {
                    console.error(`Iframe ${index + 1} failed to load:`, e);
                });
            });
        });
    </script>
</body>
</html>
