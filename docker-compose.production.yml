version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agentlink-postgres
    environment:
      POSTGRES_DB: agentlink
      POSTGRES_USER: agentlink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentlink_secure_2025}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - agentlink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlink -d agentlink"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agentlink-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-agentlink_redis_2025}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agentlink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AgentLink Application (API + Frontend)
  agentlink-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentlink-app
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://agentlink:${POSTGRES_PASSWORD:-agentlink_secure_2025}@postgres:5432/agentlink
      - REDIS_URL=redis://:${REDIS_PASSWORD:-agentlink_redis_2025}@redis:6379
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-agentlink_jwt_secret_2025_very_secure}
      - CORS_ORIGIN=http://localhost:3002,http://localhost:3000,http://localhost:5000
      - WEBSOCKET_ENABLED=true
      - CLAUDE_FLOW_ENABLED=true
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      - ./agents:/app/agents:ro
      - app_logs:/app/logs
      - ./memory:/app/memory
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentlink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Claude Code Agent Orchestration Service
  claude-code-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-latest}
    container_name: claude-code-orchestrator
    environment:
      - NODE_ENV=production
      - AGENTLINK_API_URL=http://agentlink-app:3002/api/v1
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ORCHESTRATOR_PORT=8000
      - LOG_LEVEL=info
      - AGENT_CONFIG_PATH=/app/agents
      - MEMORY_PATH=/app/memory
    volumes:
      - ./agents:/app/agents:ro
      - ./memory:/app/memory
      - orchestrator_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      agentlink-app:
        condition: service_healthy
    networks:
      - agentlink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional - for production routing)
  nginx:
    image: nginx:alpine
    container_name: agentlink-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - agentlink-app
      - claude-code-orchestrator
    networks:
      - agentlink-network
    restart: unless-stopped
    profiles:
      - production

  # Monitoring with Prometheus (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: agentlink-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - agentlink-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana Dashboard (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: agentlink-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-agentlink_grafana_2025}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana-dashboards.json:/etc/grafana/provisioning/dashboards/dashboards.json
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - agentlink-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  orchestrator_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  agentlink-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Health check for the entire stack
x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "http://localhost/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s