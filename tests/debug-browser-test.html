<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Browser Test - Posts Display</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-section { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .loading { color: blue; }
        .error { color: red; }
        .success { color: green; }
        .post-card { border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Debug Browser Test - Posts Display Issue</h1>
    <div id="debug-container"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function DebugBrowserTest() {
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [debugInfo, setDebugInfo] = useState({});

            useEffect(() => {
                console.log('🚀 Browser Debug Test: Component mounted');
                testApiCall();
            }, []);

            const testApiCall = async () => {
                console.log('📡 Testing API call...');
                setLoading(true);
                setError(null);

                try {
                    // Direct fetch to backend API
                    const response = await fetch('http://localhost:3000/api/v1/agent-posts?limit=5&offset=0&filter=all&search=&sortBy=published_at&sortOrder=DESC');
                    
                    console.log('📡 Response status:', response.status);
                    console.log('📡 Response headers:', Object.fromEntries(response.headers.entries()));
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    console.log('📦 Raw response data:', data);

                    setDebugInfo({
                        responseStatus: response.status,
                        success: data.success,
                        dataType: typeof data.data,
                        dataIsArray: Array.isArray(data.data),
                        dataLength: data.data?.length,
                        total: data.total,
                        firstPost: data.data?.[0]
                    });

                    if (data.success && Array.isArray(data.data)) {
                        console.log('✅ Setting posts array with', data.data.length, 'items');
                        setPosts(data.data);
                    } else {
                        throw new Error('Invalid response format or empty data');
                    }

                } catch (err) {
                    console.error('❌ API call failed:', err);
                    setError(err.message);
                } finally {
                    setLoading(false);
                    console.log('🏁 API test completed');
                }
            };

            console.log('🎨 Render:', { loading, error, postsLength: posts?.length });

            return (
                <div>
                    <div className="debug-section">
                        <h3>🔍 Debug Information</h3>
                        <p><strong>Loading:</strong> {loading ? 'Yes' : 'No'}</p>
                        <p><strong>Error:</strong> {error || 'None'}</p>
                        <p><strong>Posts Length:</strong> {posts?.length || 0}</p>
                        <p><strong>Response Success:</strong> {debugInfo.success ? '✅' : '❌'}</p>
                        <p><strong>Data Type:</strong> {debugInfo.dataType}</p>
                        <p><strong>Data Is Array:</strong> {debugInfo.dataIsArray ? '✅' : '❌'}</p>
                        <p><strong>Data Length:</strong> {debugInfo.dataLength}</p>
                        <p><strong>Total:</strong> {debugInfo.total}</p>
                        
                        <button onClick={testApiCall} style={{marginTop: '10px', padding: '5px 10px'}}>
                            🔄 Retry API Call
                        </button>
                    </div>

                    {loading && (
                        <div className="debug-section loading">
                            <h3>⏳ Loading Posts...</h3>
                            <p>Fetching data from backend...</p>
                        </div>
                    )}

                    {error && (
                        <div className="debug-section error">
                            <h3>❌ Error</h3>
                            <p>{error}</p>
                        </div>
                    )}

                    {!loading && !error && (
                        <div className="debug-section success">
                            <h3>📋 Posts Display ({posts?.length || 0} posts)</h3>
                            
                            {(!posts || posts.length === 0) ? (
                                <p>No posts to display</p>
                            ) : (
                                <div>
                                    <p className="success">✅ Successfully loaded {posts.length} posts!</p>
                                    {posts.map((post, index) => {
                                        console.log('🎨 Rendering post', index, post?.id);
                                        return (
                                            <div key={post?.id || index} className="post-card">
                                                <h4>{post?.title || 'Untitled'}</h4>
                                                <p><strong>By:</strong> {post?.authorAgent || 'Unknown'}</p>
                                                <p><strong>Date:</strong> {post?.publishedAt || 'No date'}</p>
                                                <p><strong>Content:</strong> {post?.content?.substring(0, 100) || 'No content'}...</p>
                                                <small>ID: {post?.id}</small>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {debugInfo.firstPost && (
                        <div className="debug-section">
                            <h3>🔬 Sample Post Data</h3>
                            <pre style={{fontSize: '12px', background: '#f5f5f5', padding: '10px', overflow: 'auto'}}>
                                {JSON.stringify(debugInfo.firstPost, null, 2)}
                            </pre>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<DebugBrowserTest />, document.getElementById('debug-container'));
    </script>
</body>
</html>
