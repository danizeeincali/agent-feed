apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-feed-api-gateway
  namespace: agent-feed
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: agent-feed/api-gateway:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: agent-feed-config
              key: NODE_ENV
        - name: PORT
          value: "3000"
        - name: POSTGRES_URL
          value: "postgresql://agent_feed_user:$(POSTGRES_PASSWORD)@postgres:5432/agent_feed"
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: agent-feed-secrets
              key: JWT_SECRET
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agent-feed-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agent-feed-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-feed-api-gateway
  namespace: agent-feed
  labels:
    app: api-gateway
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: api-gateway
---
