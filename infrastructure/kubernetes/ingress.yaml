apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-feed-ingress
  namespace: agent-feed
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  tls:
  - hosts:
    - agent-feed.example.com
    secretName: agent-feed-tls
  rules:
  - host: agent-feed.example.com
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: agent-feed-api-gateway
            port:
              number: 3000
      - path: /agents(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: agent-feed-agent-management
            port:
              number: 3001
      - path: /feeds(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: agent-feed-feed-processing
            port:
              number: 3002
      - path: /auth(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: agent-feed-user-management
            port:
              number: 3003
      - path: /users(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: agent-feed-user-management
            port:
              number: 3003
      - path: /ws(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: agent-feed-websocket
            port:
              number: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy
  namespace: agent-feed
  labels:
    app: nginx-proxy
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 443
    targetPort: 443
    name: https
  selector:
    app: nginx-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: agent-feed
  labels:
    app: nginx-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        - containerPort: 443
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: ssl-certs
          mountPath: /etc/nginx/ssl
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: ssl-certs
        secret:
          secretName: ssl-certs