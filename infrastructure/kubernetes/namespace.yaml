apiVersion: v1
kind: Namespace
metadata:
  name: agent-feed
  labels:
    name: agent-feed
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-feed-quota
  namespace: agent-feed
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    services: "20"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: agent-feed-limits
  namespace: agent-feed
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container