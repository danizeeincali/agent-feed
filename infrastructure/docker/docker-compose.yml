version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: agent-feed-postgres
    environment:
      POSTGRES_DB: agent_feed
      POSTGRES_USER: agent_feed_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_feed_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_feed_user -d agent_feed"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: agent-feed-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Application Services
  api-gateway:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api-gateway
    container_name: agent-feed-api-gateway
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      POSTGRES_URL: postgresql://agent_feed_user:${POSTGRES_PASSWORD:-agent_feed_pass}@postgres:5432/agent_feed
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-management:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.agent-management
    container_name: agent-feed-agent-management
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      POSTGRES_URL: postgresql://agent_feed_user:${POSTGRES_PASSWORD:-agent_feed_pass}@postgres:5432/agent_feed
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      API_GATEWAY_URL: http://api-gateway:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  feed-processing:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.feed-processing
    container_name: agent-feed-feed-processing
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      POSTGRES_URL: postgresql://agent_feed_user:${POSTGRES_PASSWORD:-agent_feed_pass}@postgres:5432/agent_feed
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      QUEUE_CONCURRENCY: 5
      QUEUE_DELAY: 1000
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-management:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.user-management
    container_name: agent-feed-user-management
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      POSTGRES_URL: postgresql://agent_feed_user:${POSTGRES_PASSWORD:-agent_feed_pass}@postgres:5432/agent_feed
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      BCRYPT_ROUNDS: 12
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-service:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.websocket
    container_name: agent-feed-websocket
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring Services
  prometheus:
    image: prom/prometheus:latest
    container_name: agent-feed-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - agent-feed-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: agent-feed-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3005:3000"
    depends_on:
      - prometheus
    networks:
      - agent-feed-network
    restart: unless-stopped

  # Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: agent-feed-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
      - agent-management
      - feed-processing
      - user-management
      - websocket-service
    networks:
      - agent-feed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  agent-feed-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16