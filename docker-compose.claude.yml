version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: agent_feed
      POSTGRES_USER: agent_feed_user
      POSTGRES_PASSWORD: agent_feed_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_feed_user -d agent_feed"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Main Agent Feed Application with Claude Integration
  agent-feed-claude:
    build:
      context: .
      dockerfile: Dockerfile.claude-integration
    environment:
      NODE_ENV: production
      PORT: 3000
      
      # Database configuration
      DATABASE_URL: postgresql://agent_feed_user:agent_feed_password@postgres:5432/agent_feed
      
      # Redis configuration
      REDIS_URL: redis://redis:6379
      
      # Claude Code configuration
      CLAUDE_CONFIG_DIR: /home/claude-user/.claude
      CLAUDE_SERVER_PORT: 8080
      CLAUDE_SERVER_HOST: 0.0.0.0
      CLAUDE_MAX_AGENTS: 17
      CLAUDE_SESSION_TIMEOUT: 3600
      CLAUDE_MEMORY_PERSISTENCE: true
      CLAUDE_AUTO_SCALING: true
      CLAUDE_WEBSOCKET_ENABLED: true
      
      # WebSocket configuration
      WEBSOCKET_ENABLED: true
      WEBSOCKET_CORS_ORIGIN: http://localhost:3001
      
      # Security configuration
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      
      # Logging configuration
      LOG_LEVEL: info
      
    ports:
      - "3000:3000"
      - "8080:8080"  # Claude Code server
    volumes:
      - claude_memory:/app/memory
      - claude_logs:/app/logs
      - claude_sessions:/tmp/claude-sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_WS_URL: ws://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - agent-feed-claude
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Monitoring and Health Check Service
  health-monitor:
    image: alpine:latest
    command: >
      sh -c "
        apk add --no-cache curl &&
        while true; do
          echo 'Checking service health...'
          curl -f http://agent-feed-claude:3000/health || echo 'Main app unhealthy'
          curl -f http://agent-feed-claude:3000/api/v1/claude/health || echo 'Claude integration unhealthy'
          curl -f http://frontend:3000 || echo 'Frontend unhealthy'
          echo 'Health check completed'
          sleep 60
        done
      "
    depends_on:
      - agent-feed-claude
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  claude_memory:
  claude_logs:
  claude_sessions:

networks:
  default:
    name: agent-feed-claude-network