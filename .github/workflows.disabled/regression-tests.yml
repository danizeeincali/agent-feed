name: Regression Tests

on:
  schedule:
    # Run regression tests daily at 2 AM UTC
    - cron: '0 2 * * *'
    # Run weekly comprehensive tests on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - critical
          - performance
          - accessibility
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      notify_on_failure:
        description: 'Send notifications on failure'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_VERSION: '1.40.0'

jobs:
  # Job 1: Setup and Validation
  setup:
    name: Setup Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      test-matrix: ${{ steps.matrix.outputs.matrix }}
      environment-url: ${{ steps.env.outputs.url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Test Matrix
        id: matrix
        run: |
          if [ "${{ github.event.inputs.test_suite }}" = "critical" ]; then
            echo 'matrix={"browser":["chromium"],"test-type":["smoke","critical"]}' >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_suite }}" = "performance" ]; then
            echo 'matrix={"browser":["chromium"],"test-type":["performance"]}' >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_suite }}" = "accessibility" ]; then
            echo 'matrix={"browser":["chromium","firefox"],"test-type":["accessibility"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"browser":["chromium","firefox","webkit"],"test-type":["smoke","critical","regression","accessibility"]}' >> $GITHUB_OUTPUT
          fi

      - name: Set Environment URL
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "url=https://agent-feed.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://staging.agent-feed.com" >> $GITHUB_OUTPUT
          fi

  # Job 2: Health Check
  health-check:
    name: Environment Health Check
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    steps:
      - name: Check Application Health
        run: |
          echo "Checking health of ${{ needs.setup.outputs.environment-url }}"

          # Health endpoint check
          curl -f ${{ needs.setup.outputs.environment-url }}/health || exit 1

          # API endpoint check
          curl -f ${{ needs.setup.outputs.environment-url }}/api/status || exit 1

          # Database connectivity check
          curl -f ${{ needs.setup.outputs.environment-url }}/api/health/db || exit 1

      - name: Performance Baseline Check
        run: |
          # Quick performance check
          response_time=$(curl -o /dev/null -s -w '%{time_total}' ${{ needs.setup.outputs.environment-url }})
          echo "Response time: ${response_time}s"

          # Fail if response time > 5 seconds
          if (( $(echo "$response_time > 5.0" | bc -l) )); then
            echo "Response time too slow: ${response_time}s"
            exit 1
          fi

  # Job 3: Regression Test Execution
  regression-tests:
    name: Regression Tests (${{ matrix.browser }} - ${{ matrix.test-type }})
    runs-on: ubuntu-latest
    needs: [setup, health-check]
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.test-matrix) }}
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit

      - name: Install Playwright
        run: |
          npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run Smoke Tests
        if: matrix.test-type == 'smoke' || matrix.test-type == 'critical'
        run: |
          npx playwright test tests/regression/smoke/ \
            --project=${{ matrix.browser }} \
            --reporter=json \
            --output-dir=test-results/smoke-${{ matrix.browser }}
        env:
          BASE_URL: ${{ needs.setup.outputs.environment-url }}
          TEST_TIMEOUT: 30000

      - name: Run Critical Path Tests
        if: matrix.test-type == 'critical' || matrix.test-type == 'regression'
        run: |
          npx playwright test tests/regression/critical/ \
            --project=${{ matrix.browser }} \
            --reporter=json \
            --output-dir=test-results/critical-${{ matrix.browser }}
        env:
          BASE_URL: ${{ needs.setup.outputs.environment-url }}
          TEST_TIMEOUT: 60000

      - name: Run Full Regression Suite
        if: matrix.test-type == 'regression'
        run: |
          npx playwright test tests/regression/full/ \
            --project=${{ matrix.browser }} \
            --reporter=json \
            --output-dir=test-results/regression-${{ matrix.browser }}
        env:
          BASE_URL: ${{ needs.setup.outputs.environment-url }}
          TEST_TIMEOUT: 90000

      - name: Run Performance Tests
        if: matrix.test-type == 'performance'
        run: |
          npx playwright test tests/performance/ \
            --project=${{ matrix.browser }} \
            --reporter=json \
            --output-dir=test-results/performance-${{ matrix.browser }}
        env:
          BASE_URL: ${{ needs.setup.outputs.environment-url }}
          TEST_TIMEOUT: 120000

      - name: Run Accessibility Tests
        if: matrix.test-type == 'accessibility'
        run: |
          npx playwright test tests/accessibility/ \
            --project=${{ matrix.browser }} \
            --reporter=json \
            --output-dir=test-results/accessibility-${{ matrix.browser }}
        env:
          BASE_URL: ${{ needs.setup.outputs.environment-url }}
          TEST_TIMEOUT: 60000

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results-${{ matrix.browser }}-${{ matrix.test-type }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # Job 4: Visual Regression Tests
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [setup, health-check]
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run Visual Regression Tests
        run: |
          npx playwright test tests/visual/ \
            --project=chromium \
            --reporter=json \
            --output-dir=test-results/visual
        env:
          BASE_URL: ${{ needs.setup.outputs.environment-url }}

      - name: Upload Visual Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-results
          path: |
            test-results/visual/
            test-results/visual-comparison/
          retention-days: 30

  # Job 5: Load Testing
  load-testing:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: [setup, health-check]
    if: github.event.schedule == '0 6 * * 0' || github.event.inputs.test_suite == 'full'
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run Load Tests
        run: |
          artillery run tests/load/basic-load.yml \
            --target ${{ needs.setup.outputs.environment-url }} \
            --output load-test-results.json

          artillery run tests/load/spike-test.yml \
            --target ${{ needs.setup.outputs.environment-url }} \
            --output spike-test-results.json

      - name: Generate Load Test Reports
        run: |
          artillery report load-test-results.json --output load-test-report.html
          artillery report spike-test-results.json --output spike-test-report.html

      - name: Upload Load Test Results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            *-test-results.json
            *-test-report.html
          retention-days: 30

  # Job 6: Security Regression Tests
  security-regression:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    needs: [setup, health-check]
    timeout-minutes: 25
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ needs.setup.outputs.environment-url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Run Security Headers Check
        run: |
          curl -I ${{ needs.setup.outputs.environment-url }} | grep -i security || echo "No security headers found"

      - name: Upload Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-regression-results
          path: |
            report_html.html
            report_json.json
          retention-days: 30

  # Job 7: Results Analysis and Reporting
  analyze-results:
    name: Analyze Test Results
    runs-on: ubuntu-latest
    needs: [regression-tests, visual-regression, load-testing, security-regression]
    if: always()
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Test Results
        uses: actions/download-artifact@v4

      - name: Analyze Test Results
        run: |
          echo "# Regression Test Results" > regression-report.md
          echo "**Date:** $(date)" >> regression-report.md
          echo "**Environment:** ${{ needs.setup.outputs.environment-url }}" >> regression-report.md
          echo "**Test Suite:** ${{ github.event.inputs.test_suite || 'scheduled' }}" >> regression-report.md
          echo "" >> regression-report.md

          # Count test results
          echo "## Test Summary" >> regression-report.md
          echo "- Regression Tests: $(find . -name "*regression-results*" -type d | wc -l)" >> regression-report.md
          echo "- Visual Tests: $(find . -name "*visual-regression*" -type d | wc -l)" >> regression-report.md
          echo "- Security Tests: $(find . -name "*security-regression*" -type d | wc -l)" >> regression-report.md

          # Check for failures
          if find . -name "*.json" -exec grep -l '"failures":[^0]' {} \; | head -1; then
            echo "❌ **FAILURES DETECTED**" >> regression-report.md
          else
            echo "✅ **ALL TESTS PASSED**" >> regression-report.md
          fi

      - name: Create GitHub Issue for Failures
        if: failure() && github.event.inputs.notify_on_failure != 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('regression-report.md', 'utf8');

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Regression Test Failures - ${new Date().toISOString().split('T')[0]}`,
              body: `${report}\n\n**Action:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['regression', 'bug', 'priority-high']
            });

      - name: Send Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🔄 Regression tests completed for ${{ needs.setup.outputs.environment-url }}
            Status: ${{ job.status }}
            Suite: ${{ github.event.inputs.test_suite || 'scheduled' }}

            View results: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: regression-final-report
          path: regression-report.md
          retention-days: 90