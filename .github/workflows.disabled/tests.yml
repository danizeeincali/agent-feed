name: Comprehensive Test Suite

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop, v1]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  # ============================================================================
  # Matrix Testing - Multiple Node Versions
  # ============================================================================
  test-matrix:
    name: Test on Node ${{ matrix.node-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - node-version: 18.x
            os: ubuntu-latest
            coverage: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../api-server && npm ci

      - name: Run Jest tests
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Run frontend Vitest tests
        run: cd frontend && npm run test
        env:
          NODE_ENV: test

      - name: Run API server Vitest tests
        run: cd api-server && npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info,./frontend/coverage/lcov.info,./api-server/coverage/lcov.info
          flags: unittests
          name: node-${{ matrix.node-version }}-${{ matrix.os }}

  # ============================================================================
  # Database Testing - PostgreSQL & SQLite
  # ============================================================================
  test-database:
    name: Database Tests - ${{ matrix.database }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [postgresql, sqlite]
        include:
          - database: postgresql
            db_image: postgres:15-alpine
            db_url: postgresql://postgres:test_password_123@localhost:5432/avidm_test
            use_postgres: true
          - database: sqlite
            db_url: sqlite://./data/test.db
            use_postgres: false

    services:
      postgres:
        image: ${{ matrix.database == 'postgresql' && 'postgres:15-alpine' || '' }}
        env:
          POSTGRES_DB: avidm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password_123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../api-server && npm ci

      - name: Setup PostgreSQL database
        if: matrix.database == 'postgresql'
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          PGPASSWORD=test_password_123 psql -h localhost -U postgres -d avidm_test -f src/database/schema.sql || true
        env:
          PGPASSWORD: test_password_123

      - name: Setup SQLite database
        if: matrix.database == 'sqlite'
        run: |
          mkdir -p data
          sqlite3 data/test.db < src/database/schema.sql || true

      - name: Run integration tests
        run: npm run test:phase1:integration
        env:
          DATABASE_URL: ${{ matrix.db_url }}
          USE_POSTGRES: ${{ matrix.use_postgres }}
          NODE_ENV: test

      - name: Run TDD tests
        run: npm run test:tdd
        env:
          DATABASE_URL: ${{ matrix.db_url }}
          USE_POSTGRES: ${{ matrix.use_postgres }}
          NODE_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.database }}
          path: |
            test-results/
            coverage/

  # ============================================================================
  # Performance Tests
  # ============================================================================
  test-performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../api-server && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run performance tests
        run: npm run test:performance

      - name: Run bundle analysis
        run: npm run test:performance:bundle

      - name: Upload performance report
        uses: actions/upload-artifact@v3
        with:
          name: performance-report
          path: |
            tests/performance/reports/
            bundle-analysis/

  # ============================================================================
  # E2E Tests - Comprehensive Browser Coverage
  # ============================================================================
  test-e2e-comprehensive:
    name: E2E - ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, 'Mobile Chrome', 'Mobile Safari']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../api-server && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run E2E tests
        run: npm run test:e2e -- --project="${{ matrix.project }}"
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-results-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/

  # ============================================================================
  # Regression Tests
  # ============================================================================
  test-regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../api-server && npm ci

      - name: Run regression test suite
        run: npm run test:regression

      - name: Run token analytics regression tests
        run: npm run test:token-analytics:regression

      - name: Upload regression report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: regression-report
          path: tests/regression/reports/

  # ============================================================================
  # Token Analytics Tests
  # ============================================================================
  test-token-analytics:
    name: Token Analytics Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../api-server && npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run token analytics unit tests
        run: npm run test:token-analytics:unit

      - name: Run token analytics integration tests
        run: npm run test:token-analytics:integration

      - name: Run token analytics E2E tests
        run: npm run test:token-analytics:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: token-analytics-results
          path: tests/token-analytics/reports/

  # ============================================================================
  # Component Showcase Tests
  # ============================================================================
  test-showcase:
    name: Component Showcase Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run showcase tests
        run: npm run test:showcase

      - name: Upload showcase report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: showcase-report
          path: playwright-report/

  # ============================================================================
  # Coverage Report Generation
  # ============================================================================
  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: [test-matrix, test-database]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../api-server && npm ci

      - name: Run all tests with coverage
        run: |
          npm run test:coverage
          cd frontend && npm run test
          cd ../api-server && npm run test:coverage

      - name: Generate HTML coverage report
        run: |
          npx nyc report --reporter=html --report-dir=coverage-report

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage-report/

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('./coverage/lcov-report/index.html', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Test Coverage Report\n\nCoverage report has been generated. Download the artifact to view details.'
            });

  # ============================================================================
  # Test Results Summary
  # ============================================================================
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [test-matrix, test-database, test-e2e-comprehensive, test-regression]
    if: always()
    steps:
      - name: Generate test summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Matrix Tests: ${{ needs.test-matrix.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Database Tests: ${{ needs.test-database.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: ${{ needs.test-e2e-comprehensive.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Regression Tests: ${{ needs.test-regression.result }}" >> $GITHUB_STEP_SUMMARY
