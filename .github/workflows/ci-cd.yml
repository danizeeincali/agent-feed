name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, v1 ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: agent_feed_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run TypeScript check
      run: npm run typecheck

    - name: Run unit tests
      run: npm run test:phase1
      env:
        NODE_ENV: test
        POSTGRES_URL: postgresql://test_user:test_pass@localhost:5432/agent_feed_test
        REDIS_URL: redis://localhost:6379

    - name: Run integration tests
      run: npm run test:integration
      env:
        NODE_ENV: test
        POSTGRES_URL: postgresql://test_user:test_pass@localhost:5432/agent_feed_test
        REDIS_URL: redis://localhost:6379

    - name: Run contract tests
      run: npm run test:contract
      env:
        NODE_ENV: test
        POSTGRES_URL: postgresql://test_user:test_pass@localhost:5432/agent_feed_test
        REDIS_URL: redis://localhost:6379

    - name: Run security tests
      run: npm run test:security
      env:
        NODE_ENV: test
        POSTGRES_URL: postgresql://test_user:test_pass@localhost:5432/agent_feed_test
        REDIS_URL: redis://localhost:6379

    - name: Run performance tests
      run: npm run test:performance
      env:
        NODE_ENV: test
        POSTGRES_URL: postgresql://test_user:test_pass@localhost:5432/agent_feed_test
        REDIS_URL: redis://localhost:6379

    - name: Generate coverage report
      run: |
        npm run coverage:merge
        npm run coverage:report

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/merged/lcov.info
        flags: unittests
        name: codecov-umbrella

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          coverage/
          test-results/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=moderate

    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

    - name: Run CodeQL analysis
      uses: github/codeql-action/analyze@v2
      with:
        languages: javascript

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    strategy:
      matrix:
        service: [api-gateway, agent-management, feed-processing, user-management, websocket]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./infrastructure/docker/Dockerfile.${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Setup Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name agent-feed-staging --region us-east-1

    - name: Deploy to staging
      run: |
        kubectl apply -f infrastructure/kubernetes/namespace.yaml
        kubectl apply -f infrastructure/kubernetes/configmap.yaml
        kubectl apply -f infrastructure/kubernetes/secrets.yaml
        kubectl apply -f infrastructure/kubernetes/database.yaml
        kubectl apply -f infrastructure/kubernetes/services.yaml
        kubectl apply -f infrastructure/kubernetes/monitoring.yaml
        kubectl apply -f infrastructure/kubernetes/ingress.yaml

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/agent-feed-api-gateway -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-agent-management -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-feed-processing -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-user-management -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-websocket -n agent-feed --timeout=600s

    - name: Run smoke tests
      run: |
        kubectl wait --for=condition=ready pod -l app=api-gateway -n agent-feed --timeout=300s
        kubectl port-forward svc/agent-feed-api-gateway 8080:3000 -n agent-feed &
        sleep 10
        curl -f http://localhost:8080/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Setup Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name agent-feed-production --region us-east-1

    - name: Deploy to production
      run: |
        kubectl apply -f infrastructure/kubernetes/namespace.yaml
        kubectl apply -f infrastructure/kubernetes/configmap.yaml
        kubectl apply -f infrastructure/kubernetes/secrets.yaml
        kubectl apply -f infrastructure/kubernetes/database.yaml
        kubectl apply -f infrastructure/kubernetes/services.yaml
        kubectl apply -f infrastructure/kubernetes/monitoring.yaml
        kubectl apply -f infrastructure/kubernetes/ingress.yaml

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/agent-feed-api-gateway -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-agent-management -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-feed-processing -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-user-management -n agent-feed --timeout=600s
        kubectl rollout status deployment/agent-feed-websocket -n agent-feed --timeout=600s

    - name: Run production health checks
      run: |
        kubectl wait --for=condition=ready pod -l app=api-gateway -n agent-feed --timeout=300s
        # Add additional production health checks here

  notification:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}