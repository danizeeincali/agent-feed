name: Regression Prevention Pipeline

on:
  push:
    branches: [ main, develop, v* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily health checks at 6 AM UTC
    - cron: '0 6 * * *'

env:
  NODE_VERSION: '20'
  FRONTEND_PORT: 5173
  BACKEND_PORT: 3001

jobs:
  build-validation:
    name: Build Validation - Prevent White Screen of Death
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install backend dependencies
      run: npm ci
      
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: TypeScript compilation check - Backend
      run: npm run typecheck
      
    - name: TypeScript compilation check - Frontend
      working-directory: ./frontend
      run: npm run typecheck
      
    - name: Build backend
      run: npm run build
      
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Run build validation tests
      run: npm run test:build-validation
      
    - name: Log success to NLD
      if: success()
      run: node scripts/nld-log-success.js "ci-build-validation" '{"commit":"${{ github.sha }}","branch":"${{ github.ref_name }}"}'
      
    - name: Log failure to NLD
      if: failure()
      run: |
        mkdir -p nld-agent/records
        echo '{
          "type": "build-validation-failure",
          "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)'",
          "commit": "${{ github.sha }}",
          "branch": "${{ github.ref_name }}",
          "failureType": "ci-build-failure",
          "impact": "deployment-blocked"
        }' > nld-agent/records/ci-build-failure-$(date +%s).json

  component-integration:
    name: Component Integration - Prevent Import Errors
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-validation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd frontend && npm ci
        
    - name: Validate component imports/exports
      run: node scripts/validate-imports.js
      
    - name: Run component integration tests
      working-directory: ./frontend
      run: npm test -- tests/regression/component-integration.test.tsx --passWithNoTests
      
    - name: Log success to NLD
      if: success()
      run: node scripts/nld-log-success.js "ci-component-integration" '{"commit":"${{ github.sha }}"}'

  cors-validation:
    name: CORS Validation - Prevent WebSocket Blocking
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-validation
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: agentfeed_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd frontend && npm ci
        
    - name: Setup test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:testpass@localhost:5432/agentfeed_test" >> .env
        echo "NODE_ENV=test" >> .env
        
    - name: Start backend server
      run: |
        npm run build
        npm start &
        sleep 10
        
    - name: Run CORS validation tests
      run: npm run test:cors-validation
      
    - name: Log success to NLD
      if: success()
      run: node scripts/nld-log-success.js "ci-cors-validation" '{"commit":"${{ github.sha }}"}'

  terminal-e2e:
    name: Terminal E2E - Prevent Input Hanging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-validation, cors-validation]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: agentfeed_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd frontend && npm ci
        
    - name: Install Playwright
      working-directory: ./frontend
      run: npx playwright install --with-deps
      
    - name: Setup test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:testpass@localhost:5432/agentfeed_test" >> .env
        echo "NODE_ENV=test" >> .env
        
    - name: Build applications
      run: |
        npm run build
        cd frontend && npm run build
        
    - name: Start servers
      run: |
        npm start &
        cd frontend && npm run preview -- --port ${{ env.FRONTEND_PORT }} &
        sleep 15
        
    - name: Run terminal E2E tests
      run: npm run test:terminal-e2e
      
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 7
        
    - name: Log success to NLD
      if: success()
      run: node scripts/nld-log-success.js "ci-terminal-e2e" '{"commit":"${{ github.sha }}"}'

  health-monitoring:
    name: System Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: agentfeed_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd frontend && npm ci
        
    - name: Setup test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:testpass@localhost:5432/agentfeed_test" >> .env
        echo "NODE_ENV=test" >> .env
        
    - name: Build and start servers
      run: |
        npm run build
        cd frontend && npm run build
        npm start &
        cd frontend && npm run preview -- --port ${{ env.FRONTEND_PORT }} &
        sleep 15
        
    - name: Run health monitoring checks
      run: timeout 60 node scripts/health-monitor.js || true
      
    - name: Collect NLD records
      if: always()
      run: |
        if [ -d "nld-agent/records" ]; then
          echo "NLD Records generated:"
          ls -la nld-agent/records/
          echo "Health check results:"
          find nld-agent/records -name "health-*.json" -exec cat {} \; | head -20
        fi
        
    - name: Upload NLD records
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nld-records-${{ github.run_id }}
        path: nld-agent/records/
        retention-days: 30

  regression-summary:
    name: Regression Prevention Summary
    runs-on: ubuntu-latest
    needs: [build-validation, component-integration, cors-validation, terminal-e2e]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Generate regression prevention report
      run: |
        echo "# Regression Prevention Report" > regression_report.md
        echo "" >> regression_report.md
        echo "**Commit:** ${{ github.sha }}" >> regression_report.md
        echo "**Branch:** ${{ github.ref_name }}" >> regression_report.md
        echo "**Date:** $(date -u)" >> regression_report.md
        echo "" >> regression_report.md
        echo "## Test Results" >> regression_report.md
        echo "" >> regression_report.md
        echo "- Build Validation: ${{ needs.build-validation.result }}" >> regression_report.md
        echo "- Component Integration: ${{ needs.component-integration.result }}" >> regression_report.md
        echo "- CORS Validation: ${{ needs.cors-validation.result }}" >> regression_report.md
        echo "- Terminal E2E: ${{ needs.terminal-e2e.result }}" >> regression_report.md
        echo "" >> regression_report.md
        
        if [[ "${{ needs.build-validation.result }}" == "success" && 
              "${{ needs.component-integration.result }}" == "success" && 
              "${{ needs.cors-validation.result }}" == "success" && 
              "${{ needs.terminal-e2e.result }}" == "success" ]]; then
          echo "✅ **All regression prevention checks passed!**" >> regression_report.md
          echo "No known failure patterns detected." >> regression_report.md
        else
          echo "❌ **Regression prevention failures detected!**" >> regression_report.md
          echo "Review failed checks and fix issues before deployment." >> regression_report.md
        fi
        
        cat regression_report.md
        
    - name: Upload regression report
      uses: actions/upload-artifact@v4
      with:
        name: regression-prevention-report-${{ github.run_id }}
        path: regression_report.md
        retention-days: 30