name: Claude Process Regression Testing Pipeline

on:
  push:
    branches: [main, v1]
    paths:
      - 'simple-backend.js'
      - 'src/**'
      - 'frontend/**'
      - 'tests/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  
jobs:
  unit-tests:
    name: TDD London School Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: |
          cd tests/regression
          npm ci
      
      - name: Run Unit Tests
        run: |
          cd tests/regression
          npm run test:spawning
          npm run test:directories
          npm run test:auth
      
      - name: Upload Coverage
        uses: actions/upload-artifact@v3
        with:
          name: unit-coverage
          path: tests/regression/coverage/
  
  integration-tests:
    name: SSE Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Backend Dependencies
        run: npm install
      
      - name: Start Backend Server
        run: |
          node simple-backend.js &
          sleep 5
          curl -f http://localhost:3000/health || exit 1
      
      - name: Run Integration Tests
        run: |
          cd tests/regression
          npm run test:sse
          npm run test:errors
  
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Dependencies
        run: |
          npm install
          cd frontend && npm install
          cd ../tests/playwright/claude-regression && npm install
          npx playwright install --with-deps ${{ matrix.browser }}
      
      - name: Start Services
        run: |
          node simple-backend.js &
          cd frontend && npm run dev &
          sleep 10
      
      - name: Run E2E Tests
        run: |
          cd tests/playwright/claude-regression
          npx playwright test --browser=${{ matrix.browser }}
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report-${{ matrix.browser }}
          path: tests/playwright/claude-regression/test-results/
  
  nld-monitoring:
    name: NLD Pattern Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Check for Regression Patterns
        run: |
          # Check for --print flag reintroduction
          if grep -r "\-\-print" simple-backend.js src/; then
            echo "ERROR: --print flag detected in Claude spawn commands!"
            exit 1
          fi
          
          # Check for Mock Claude activation
          if grep -r "MockClaudeProcess\|createMockClaudeInstance" simple-backend.js | grep -v "^//"; then
            echo "ERROR: Mock Claude code detected!"
            exit 1
          fi
          
          echo "✅ No regression patterns detected"
  
  performance-benchmarks:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Performance Tests
        run: |
          node simple-backend.js &
          sleep 5
          
          # Test instance creation time
          START_TIME=$(date +%s%N)
          curl -X POST http://localhost:3000/api/claude/instances \
            -H "Content-Type: application/json" \
            -d '{"command": ["claude"], "instanceType": "prod"}'
          END_TIME=$(date +%s%N)
          DURATION=$((($END_TIME - $START_TIME) / 1000000))
          
          if [ $DURATION -gt 30000 ]; then
            echo "ERROR: Instance creation took ${DURATION}ms (limit: 30000ms)"
            exit 1
          fi
          
          echo "✅ Performance within limits: ${DURATION}ms"
  
  swarm-orchestration:
    name: Swarm Test Orchestration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Dependencies
        run: |
          cd tests/swarm-orchestration
          npm install
      
      - name: Run Swarm Tests
        run: |
          cd tests/swarm-orchestration
          npm run test:ci
      
      - name: Upload Swarm Results
        uses: actions/upload-artifact@v3
        with:
          name: swarm-results
          path: tests/swarm-orchestration/reports/
  
  regression-report:
    name: Generate Regression Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, nld-monitoring, performance-benchmarks]
    if: always()
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v3
      
      - name: Generate Summary Report
        run: |
          echo "# Claude Process Regression Test Report" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ NLD Monitoring: ${{ needs.nld-monitoring.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Performance: ${{ needs.performance-benchmarks.result }}" >> $GITHUB_STEP_SUMMARY
          
          # Check for any failures
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "## ⚠️ REGRESSION DETECTED!" >> $GITHUB_STEP_SUMMARY
            echo "One or more tests failed. Please review the test results above." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "## ✅ All regression tests passed!" >> $GITHUB_STEP_SUMMARY
          fi
  
  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [regression-report]
    if: failure() && github.event_name == 'push'
    
    steps:
      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST $SLACK_WEBHOOK_URL \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "⚠️ Claude Process Regression Detected!",
                "blocks": [{
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Regression detected in Claude process functionality*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }]
              }'
          fi