name: Dynamic Pages CI/CD Pipeline

on:
  push:
    branches: [main, develop, v1]
    paths:
      - 'src/**'
      - 'pages/**'
      - 'components/**'
      - 'tests/**'
      - 'package*.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pages/**'
      - 'components/**'
      - 'tests/**'
      - 'package*.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip test execution'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  CACHE_VERSION: v1
  PLAYWRIGHT_VERSION: '1.40.0'

jobs:
  # Job 1: Code Quality & Preparation
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-setup.outputs.cache-key }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Setup
        id: cache-setup
        run: |
          echo "cache-key=deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          npm ls --depth=0

      - name: Lint Code
        run: |
          npm run lint
          npm run lint:css || echo "CSS linting not configured"

      - name: Type Check
        run: |
          npm run typecheck || echo "TypeScript checking not configured"

      - name: Format Check
        run: |
          npm run format:check || echo "Format checking not configured"

      - name: Security Audit
        run: |
          npm audit --audit-level=high
        continue-on-error: true

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ steps.cache-setup.outputs.cache-key }}
          restore-keys: |
            deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15
    strategy:
      matrix:
        test-group: [core, components, utils, pages]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ needs.code-quality.outputs.cache-key }}
          restore-keys: |
            deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Unit Tests
        run: |
          npm run test:unit -- --group=${{ matrix.test-group }} --coverage --reporter=json --outputFile=coverage-${{ matrix.test-group }}.json
        env:
          NODE_ENV: test

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.test-group }}
          path: coverage-${{ matrix.test-group }}.json
          retention-days: 1

  # Job 3: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ needs.code-quality.outputs.cache-key }}

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Setup Test Database
        run: |
          npm run db:migrate:test || echo "No database migrations configured"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Run Integration Tests
        run: |
          npm run test:integration -- --reporter=json --outputFile=integration-results.json
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Upload Integration Results
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: integration-results.json
          retention-days: 1

  # Job 4: End-to-End Tests
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 30
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        device: [desktop, mobile]
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ needs.code-quality.outputs.cache-key }}

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright Browsers
        run: |
          npx playwright install ${{ matrix.browser }} --with-deps

      - name: Build Application
        run: |
          npm run build
        env:
          NODE_ENV: production

      - name: Start Application
        run: |
          npm run start &
          sleep 10
          curl -f http://localhost:3000 || exit 1
        env:
          NODE_ENV: production
          PORT: 3000

      - name: Run E2E Tests
        run: |
          npx playwright test --project=${{ matrix.browser }}-${{ matrix.device }} --reporter=json --output-dir=test-results-${{ matrix.browser }}-${{ matrix.device }}
        env:
          PLAYWRIGHT_HTML_REPORT: test-results-${{ matrix.browser }}-${{ matrix.device }}/report

      - name: Upload E2E Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}-${{ matrix.device }}
          path: |
            test-results-${{ matrix.browser }}-${{ matrix.device }}/
            playwright-report/
          retention-days: 7

  # Job 5: Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --production

  # Job 6: Performance Benchmarks
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ needs.code-quality.outputs.cache-key }}

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build Application
        run: npm run build

      - name: Run Performance Benchmarks
        run: |
          chmod +x ./scripts/ci/performance-check.sh
          ./scripts/ci/performance-check.sh
        env:
          NODE_ENV: production

      - name: Upload Performance Reports
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: performance-reports/
          retention-days: 30

  # Job 7: Test Results Aggregation
  test-results:
    name: Aggregate Test Results
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Aggregate Test Results
        run: |
          echo "# Test Results Summary" > test-summary.md
          echo "## Coverage Reports" >> test-summary.md
          find . -name "coverage-*.json" -exec echo "Found coverage: {}" \;

          echo "## Integration Tests" >> test-summary.md
          find . -name "integration-results.json" -exec echo "Found integration: {}" \;

          echo "## E2E Tests" >> test-summary.md
          find . -name "e2e-results-*" -type d -exec echo "Found E2E: {}" \;

      - name: Comment PR with Results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            try {
              const summary = fs.readFileSync('test-summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } catch (error) {
              console.log('Could not read test summary:', error);
            }

  # Job 8: Deployment to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, security-scan, performance-tests]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    timeout-minutes: 15
    environment:
      name: staging
      url: https://staging.agent-feed.com
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build for Staging
        run: npm run build
        env:
          NODE_ENV: staging
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Deploy to Staging
        run: |
          chmod +x ./scripts/ci/deploy-staging.sh
          ./scripts/ci/deploy-staging.sh
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}

      - name: Smoke Tests on Staging
        run: |
          sleep 30
          curl -f https://staging.agent-feed.com/health || exit 1
          npm run test:smoke -- --baseURL=https://staging.agent-feed.com

      - name: Notify Deployment Success
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: success
          text: '✅ Staging deployment successful for ${{ github.ref }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Deployment Failure
        uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: failure
          text: '❌ Staging deployment failed for ${{ github.ref }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Job 9: Production Deployment
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    environment:
      name: production
      url: https://agent-feed.com
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build for Production
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Deploy to Production
        run: |
          # Deployment script would go here
          echo "Deploying to production..."
        env:
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}

      - name: Post-Deployment Tests
        run: |
          sleep 60
          curl -f https://agent-feed.com/health || exit 1
          npm run test:smoke -- --baseURL=https://agent-feed.com

      - name: Notify Production Deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            🚀 Production deployment ${{ job.status }} for ${{ github.ref }}
            Commit: ${{ github.event.head_commit.message }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}