name: Production Structure Validation

on:
  push:
    branches: [ main, v1 ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  structure-validation:
    runs-on: ubuntu-latest
    name: Validate Production Directory Structure
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        cd frontend && npm ci
        
    - name: Run Structure Validation
      id: validation
      run: |
        echo "🔍 Running production structure validation..."
        node prod/scripts/structure-validator.js validate
        
    - name: Generate Structure Report
      if: always()
      run: |
        node prod/scripts/structure-validator.js report
        
    - name: Upload Structure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: structure-validation-report
        path: prod/reports/
        
    - name: Run Pre-deployment Check
      if: github.ref == 'refs/heads/main'
      run: |
        node -e "
          const CIIntegration = require('./prod/config/ci-integration');
          const ci = new CIIntegration();
          ci.runCIWorkflow('pre-deployment');
        "
        
    - name: Comment PR with validation results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find the latest report
          const reportDir = 'prod/reports';
          if (fs.existsSync(reportDir)) {
            const files = fs.readdirSync(reportDir)
              .filter(f => f.startsWith('structure-report-'))
              .sort()
              .reverse();
              
            if (files.length > 0) {
              const reportPath = path.join(reportDir, files[0]);
              const report = fs.readFileSync(reportPath, 'utf8');
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🛡️ Production Structure Validation\n\n${report}`
              });
            }
          }