<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug User-Reported Error</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-left: 4px solid #007acc; }
        .error { background: #ffe6e6; border-left-color: #cc0000; }
        .success { background: #e6ffe6; border-left-color: #00cc00; }
    </style>
</head>
<body>
    <h1>🔍 Debug: User-Reported "Claude Code not found" Error</h1>
    
    <div class="debug">
        <h3>1. Frontend Status</h3>
        <div id="frontend-status">Checking...</div>
    </div>
    
    <div class="debug">
        <h3>2. API Endpoint Test</h3>
        <div id="api-status">Testing...</div>
    </div>
    
    <div class="debug">
        <h3>3. SimpleLauncher Component State</h3>
        <div id="component-status">Loading...</div>
    </div>
    
    <div class="debug">
        <h3>4. Network Requests</h3>
        <div id="network-status">Monitoring...</div>
    </div>
    
    <div class="debug">
        <h3>5. Browser Console Errors</h3>
        <div id="console-errors">Collecting...</div>
    </div>

    <script>
        // 1. Test API directly
        fetch('/api/claude/check')
            .then(response => response.json())
            .then(data => {
                document.getElementById('api-status').innerHTML = `
                    <div class="success">✅ API Response: ${JSON.stringify(data)}</div>
                `;
            })
            .catch(error => {
                document.getElementById('api-status').innerHTML = `
                    <div class="error">❌ API Error: ${error.message}</div>
                `;
            });

        // 2. Check if SimpleLauncher is accessible
        fetch('/simple-launcher')
            .then(response => response.text())
            .then(html => {
                const hasErrorMessage = html.includes('Claude Code not found') || 
                                      html.includes('Please install Claude');
                document.getElementById('frontend-status').innerHTML = hasErrorMessage ? 
                    '<div class="error">❌ Error message found in HTML response</div>' :
                    '<div class="success">✅ No error message in HTML response</div>';
            })
            .catch(error => {
                document.getElementById('frontend-status').innerHTML = `
                    <div class="error">❌ Frontend Error: ${error.message}</div>
                `;
            });

        // 3. Load SimpleLauncher in iframe to test component
        const iframe = document.createElement('iframe');
        iframe.src = '/simple-launcher';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        
        iframe.onload = () => {
            setTimeout(() => {
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const bodyText = iframeDoc.body.textContent || iframeDoc.body.innerText;
                    const hasError = bodyText.includes('Claude Code not found') || 
                                   bodyText.includes('Please install Claude');
                    
                    document.getElementById('component-status').innerHTML = hasError ?
                        '<div class="error">❌ Component shows error message</div>' :
                        '<div class="success">✅ Component does not show error message</div>';
                } catch (e) {
                    document.getElementById('component-status').innerHTML = `
                        <div class="error">❌ Cannot access iframe: ${e.message}</div>
                    `;
                }
            }, 3000);
        };

        // 4. Monitor network requests
        const originalFetch = window.fetch;
        const requests = [];
        window.fetch = function(...args) {
            requests.push({
                url: args[0],
                timestamp: new Date().toISOString()
            });
            return originalFetch.apply(this, args);
        };

        // 5. Capture console errors
        const consoleErrors = [];
        const originalError = console.error;
        console.error = function(...args) {
            consoleErrors.push(args.join(' '));
            originalError.apply(console, args);
        };

        // Update displays every 2 seconds
        setInterval(() => {
            document.getElementById('network-status').innerHTML = 
                requests.length > 0 ? 
                    `<div class="success">📡 ${requests.length} requests: ${requests.map(r => r.url).join(', ')}</div>` :
                    '<div>No network requests captured</div>';
                    
            document.getElementById('console-errors').innerHTML = 
                consoleErrors.length > 0 ? 
                    `<div class="error">❌ ${consoleErrors.length} errors: ${consoleErrors.join('; ')}</div>` :
                    '<div class="success">✅ No console errors</div>';
        }, 2000);
    </script>
</body>
</html>
