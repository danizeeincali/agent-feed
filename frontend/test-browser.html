<!DOCTYPE html>
<html>
<head>
    <title>Test Agent Feed App Loading</title>
</head>
<body>
    <h1>Testing Agent Feed App</h1>
    <iframe src="http://localhost:5173" width="100%" height="600" style="border: 1px solid #ccc;"></iframe>

    <script>
        // Test if the app loads
        setTimeout(() => {
            const iframe = document.querySelector('iframe');
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const root = iframeDoc.getElementById('root');
                console.log('Root element found:', !!root);
                console.log('Root content:', root ? root.innerHTML.substring(0, 200) : 'None');
            } catch (e) {
                console.log('Cross-origin error (expected):', e.message);
            }
        }, 3000);
    </script>
</body>
</html>
