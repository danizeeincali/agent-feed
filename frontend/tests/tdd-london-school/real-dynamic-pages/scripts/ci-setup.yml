# London School TDD - CI/CD Configuration for Real Dynamic Pages Testing
# 
# CRITICAL: NO MOCKS POLICY - All tests run against real services
# This configuration ensures true integration testing in CI environment

name: London School TDD - Real Dynamic Pages Integration

on:
  push:
    branches: [ main, develop ]
    paths: 
      - 'frontend/src/components/DynamicAgentPageRenderer.tsx'
      - 'frontend/src/services/api.ts'
      - 'frontend/tests/tdd-london-school/real-dynamic-pages/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/src/components/DynamicAgentPageRenderer.tsx'
      - 'frontend/src/services/api.ts'
      - 'frontend/tests/tdd-london-school/real-dynamic-pages/**'

env:
  NODE_VERSION: '18'
  BACKEND_PORT: 3000
  FRONTEND_PORT: 5173
  TEST_TIMEOUT: 300000  # 5 minutes for real integration tests

jobs:
  london-school-tdd-real-integration:
    name: 🔥 London School TDD - Real API Integration
    runs-on: ubuntu-latest
    
    # Service containers for real database testing
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: agent_feed_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          package-lock.json
    
    - name: 📦 Install Dependencies
      run: |
        npm ci
        cd frontend && npm ci
    
    - name: 🗄️ Setup Real Test Database
      run: |
        # Setup real database for integration testing
        export DATABASE_URL="postgresql://test_user:test_password@localhost:5432/agent_feed_test"
        npm run db:migrate:test || echo "Migration setup for CI"
        npm run db:seed:test || echo "Seeding test data for CI"
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/agent_feed_test
    
    - name: 🚀 Start Real Backend Service
      run: |
        # Start real backend for integration testing
        npm run start:backend:test &
        
        # Wait for backend to be ready
        timeout 60 bash -c 'until curl -f http://localhost:3000/api/health; do sleep 2; done'
        
        echo "✅ Real backend service started and healthy"
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/agent_feed_test
        PORT: ${{ env.BACKEND_PORT }}
    
    - name: 🌐 Start Real Frontend Service  
      run: |
        cd frontend
        npm run build
        npm run preview &
        
        # Wait for frontend to be ready
        timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'
        
        echo "✅ Real frontend service started"
      env:
        REACT_APP_API_URL: http://localhost:3000/api
        REACT_APP_WS_URL: ws://localhost:3000/ws
    
    - name: 🔥 Verify London School TDD Environment
      run: |
        echo "🚫 NO MOCKS POLICY: Verifying real services are running"
        
        # Verify backend health
        curl -f http://localhost:3000/api/health || (echo "❌ Backend health check failed" && exit 1)
        
        # Verify database connection
        curl -f http://localhost:3000/api/health | grep -q '"database":true' || (echo "❌ Database connection failed" && exit 1)
        
        # Verify frontend
        curl -f http://localhost:5173 || (echo "❌ Frontend health check failed" && exit 1)
        
        echo "✅ All real services verified for London School TDD testing"
    
    - name: 🧪 API Integration Tests (Real Backend)
      run: |
        cd frontend/tests/tdd-london-school/real-dynamic-pages
        
        echo "🌐 Running API Integration Tests against real backend"
        npm test -- --testPathPattern="api-integration" \
                     --verbose \
                     --testTimeout=${{ env.TEST_TIMEOUT }} \
                     --detectOpenHandles \
                     --forceExit
      env:
        REACT_APP_API_URL: http://localhost:3000/api
        NODE_ENV: test
    
    - name: 🎭 Component Behavior Tests (Real Data)
      run: |
        cd frontend/tests/tdd-london-school/real-dynamic-pages
        
        echo "🎭 Running Component Behavior Tests with real data"
        npm test -- --testPathPattern="component-behavior" \
                     --verbose \
                     --testTimeout=${{ env.TEST_TIMEOUT }} \
                     --detectOpenHandles \
                     --forceExit
      env:
        REACT_APP_API_URL: http://localhost:3000/api
        NODE_ENV: test
    
    - name: ❌ Error Handling Tests (Real Failures)
      run: |
        cd frontend/tests/tdd-london-school/real-dynamic-pages
        
        echo "❌ Running Error Handling Tests with real failure scenarios"
        npm test -- --testPathPattern="error-handling" \
                     --verbose \
                     --testTimeout=${{ env.TEST_TIMEOUT }} \
                     --detectOpenHandles \
                     --forceExit
      env:
        REACT_APP_API_URL: http://localhost:3000/api
        NODE_ENV: test
    
    - name: ⚡ Performance Tests (Real Load)
      run: |
        cd frontend/tests/tdd-london-school/real-dynamic-pages
        
        echo "⚡ Running Performance Tests with real system load"
        npm test -- --testPathPattern="performance" \
                     --verbose \
                     --testTimeout=${{ env.TEST_TIMEOUT }} \
                     --detectOpenHandles \
                     --forceExit
      env:
        REACT_APP_API_URL: http://localhost:3000/api
        NODE_ENV: test
    
    - name: 🎬 Install Playwright for User Journey Tests
      run: |
        cd frontend
        npx playwright install --with-deps chromium
    
    - name: 🚶 User Journey Tests (Real Browser Automation)
      run: |
        cd frontend
        
        echo "🚶 Running User Journey Tests with real browser automation"
        npx playwright test tests/tdd-london-school/real-dynamic-pages/user-journey/ \
                          --config=tests/tdd-london-school/real-dynamic-pages/playwright.config.ts \
                          --reporter=html
      env:
        PLAYWRIGHT_BASE_URL: http://localhost:5173
        API_BASE_URL: http://localhost:3000/api
    
    - name: 📊 Generate Coverage Report
      run: |
        cd frontend/tests/tdd-london-school/real-dynamic-pages
        
        echo "📊 Generating comprehensive coverage report"
        npm test -- --coverage \
                     --testPathPattern="(api-integration|component-behavior|error-handling|performance)" \
                     --coverageDirectory="./reports/coverage" \
                     --coverageReporters="text,lcov,html,json" \
                     --collectCoverageFrom="../../src/components/DynamicAgentPageRenderer.tsx" \
                     --collectCoverageFrom="../../src/services/api.ts"
    
    - name: 📋 Generate London School TDD Report
      run: |
        cd frontend/tests/tdd-london-school/real-dynamic-pages
        
        # Run the comprehensive test report script
        chmod +x scripts/run-tests.sh
        ./scripts/run-tests.sh || echo "Test script completed"
        
        echo "📋 London School TDD test report generated"
    
    - name: 📤 Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: london-school-tdd-reports
        path: |
          frontend/tests/tdd-london-school/real-dynamic-pages/reports/
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 30
    
    - name: 📤 Upload Coverage Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: london-school-coverage
        path: |
          frontend/tests/tdd-london-school/real-dynamic-pages/reports/coverage/
        retention-days: 30
    
    - name: 🎯 Validate London School TDD Compliance
      run: |
        echo "🎯 Validating London School TDD compliance..."
        
        # Check that no mock files exist in test directory
        if find frontend/tests/tdd-london-school/real-dynamic-pages -name "*mock*" -o -name "*stub*" | head -1; then
          echo "❌ VIOLATION: Mock files found in London School TDD tests"
          exit 1
        fi
        
        # Verify real API calls were made
        if ! grep -r "fetch.*localhost:3000" frontend/tests/tdd-london-school/real-dynamic-pages/; then
          echo "⚠️ Warning: No real API calls detected in test logs"
        fi
        
        echo "✅ London School TDD compliance validated"
        echo "✅ NO MOCKS POLICY successfully enforced"
        echo "✅ Real object collaboration testing completed"
    
    - name: 📈 Post Test Summary
      if: always()
      run: |
        echo "🔥 London School TDD - Real Dynamic Pages Testing Complete"
        echo "========================================================="
        echo ""
        echo "✅ Test Categories Executed:"
        echo "  🌐 API Integration Tests (Real Backend Calls)"
        echo "  🎭 Component Behavior Tests (Real Data Rendering)"  
        echo "  ❌ Error Handling Tests (Real Failure Scenarios)"
        echo "  ⚡ Performance Tests (Real System Load)"
        echo "  🚶 User Journey Tests (Real Browser Automation)"
        echo ""
        echo "🎯 London School TDD Principles Applied:"
        echo "  ✅ Outside-in development approach"
        echo "  ✅ Real object collaboration testing"
        echo "  ✅ Behavior verification over state testing"
        echo "  ✅ Contract-based API validation"
        echo "  🚫 ZERO MOCKS POLICY enforced"
        echo ""
        echo "📊 Reports Available:"
        echo "  📋 Test Report: reports/london-school-test-report.html"
        echo "  📊 Coverage Report: reports/coverage/lcov-report/index.html"
        echo "  🎬 Playwright Report: playwright-report/index.html"