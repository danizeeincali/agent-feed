<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual UI Element Check</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .status { font-weight: bold; }
        .pass { color: green; }
        .fail { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>Manual UI Element Check</h1>
    <p>This page checks what UI elements are actually present in the application.</p>
    
    <div class="test-section">
        <h3>Test 1: Load Application in iframe</h3>
        <iframe id="app-frame" src="http://localhost:5173" width="100%" height="600" frameborder="1"></iframe>
    </div>
    
    <div class="test-section">
        <h3>Test Results:</h3>
        <div id="results"></div>
    </div>

    <script>
        const iframe = document.getElementById('app-frame');
        const resultsDiv = document.getElementById('results');

        function addResult(test, status, details) {
            const div = document.createElement('div');
            div.innerHTML = `<span class="status ${status.toLowerCase()}">${status}</span> ${test}: ${details}`;
            resultsDiv.appendChild(div);
        }

        iframe.onload = function() {
            setTimeout(() => {
                try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    
                    // Test 1: Check for agent-related elements
                    const agentElements = doc.querySelectorAll('[data-testid*="agent"], .agent-card, .agent-item, .agent, [class*="agent"]');
                    addResult('Agent Elements', agentElements.length > 0 ? 'PASS' : 'FAIL', 
                        `Found ${agentElements.length} elements with agent-related selectors`);
                    
                    // Test 2: Check for navigation
                    const navElements = doc.querySelectorAll('nav, [data-testid*="nav"], .nav, [class*="nav"]');
                    addResult('Navigation Elements', navElements.length > 0 ? 'PASS' : 'FAIL',
                        `Found ${navElements.length} navigation elements`);
                    
                    // Test 3: Check for any list elements
                    const listElements = doc.querySelectorAll('[data-testid*="list"], .list, ul, ol, [class*="list"]');
                    addResult('List Elements', listElements.length > 0 ? 'PASS' : 'FAIL',
                        `Found ${listElements.length} list elements`);
                    
                    // Test 4: Check for React root
                    const reactRoot = doc.querySelector('#root, [data-reactroot], .app, main');
                    addResult('React Root', reactRoot ? 'PASS' : 'FAIL',
                        reactRoot ? `Found: ${reactRoot.tagName.toLowerCase()}` : 'No React root found');
                    
                    // Test 5: Check for actual content
                    const textContent = doc.body.textContent || '';
                    addResult('Content Length', textContent.length > 100 ? 'PASS' : 'FAIL',
                        `${textContent.length} characters of content`);
                    
                    // Test 6: Check for error messages
                    const hasErrors = textContent.toLowerCase().includes('error') || 
                                     textContent.toLowerCase().includes('failed') ||
                                     textContent.toLowerCase().includes('not found');
                    addResult('Error Messages', hasErrors ? 'FAIL' : 'PASS',
                        hasErrors ? 'Found error messages in content' : 'No error messages detected');
                    
                    // Test 7: Check specific React components
                    const reactComponents = doc.querySelectorAll('[data-testid], [class*="component"], [class*="Component"]');
                    addResult('React Components', reactComponents.length > 0 ? 'PASS' : 'FAIL',
                        `Found ${reactComponents.length} components with React-style attributes`);
                        
                    // Test 8: Look for the actual agent manager/feed components
                    const feedComponents = doc.querySelectorAll('[class*="feed"], [class*="manager"], [data-testid*="feed"], [data-testid*="manager"]');
                    addResult('Feed/Manager Components', feedComponents.length > 0 ? 'PASS' : 'FAIL',
                        `Found ${feedComponents.length} feed/manager components`);
                    
                    // Show all found elements for debugging
                    const allElements = Array.from(doc.querySelectorAll('*'))
                        .filter(el => el.className || el.getAttribute('data-testid'))
                        .slice(0, 20); // Limit to first 20 for readability
                    
                    const elementList = allElements.map(el => 
                        `${el.tagName.toLowerCase()}${el.className ? '.' + el.className.split(' ')[0] : ''}${el.getAttribute('data-testid') ? '[' + el.getAttribute('data-testid') + ']' : ''}`
                    ).join(', ');
                    
                    addResult('Element Sample', 'INFO', `First 20 elements: ${elementList}`);
                    
                } catch (error) {
                    addResult('iframe Access', 'FAIL', `Cannot access iframe content: ${error.message}`);
                }
            }, 3000); // Wait 3 seconds for app to load
        };

        iframe.onerror = function() {
            addResult('iframe Load', 'FAIL', 'Failed to load application in iframe');
        };
    </script>
</body>
</html>
