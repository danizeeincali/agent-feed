<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Runtime Debugger</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        .error { color: #ff4444; background: #2a1010; padding: 10px; margin: 5px 0; border-left: 4px solid #ff4444; }
        .success { color: #44ff44; background: #102a10; padding: 10px; margin: 5px 0; border-left: 4px solid #44ff44; }
        .info { color: #4444ff; background: #101a2a; padding: 10px; margin: 5px 0; border-left: 4px solid #4444ff; }
        #log { height: 400px; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #000; }
    </style>
</head>
<body>
    <h1>🚨 NUCLEAR RUNTIME DEBUGGER</h1>
    <div id="status">Initializing diagnostics...</div>
    <div id="log"></div>
    
    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        function logMessage(message, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = new Date().toISOString() + ' - ' + message;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(`[${type}] ${message}`);
        }
        
        // Capture all errors
        window.addEventListener('error', (e) => {
            logMessage(`JavaScript Error: ${e.message} at ${e.filename}:${e.lineno}:${e.colno}`, 'error');
            logMessage(`Stack: ${e.error?.stack || 'No stack trace'}`, 'error');
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            logMessage(`Unhandled Promise Rejection: ${e.reason}`, 'error');
        });
        
        // Test basic functionality
        logMessage('Starting nuclear diagnostics...', 'info');
        
        async function runDiagnostics() {
            try {
                // Test 1: Basic DOM manipulation
                logMessage('✓ Basic DOM manipulation working', 'success');
                
                // Test 2: Fetch API
                try {
                    const response = await fetch('/');
                    logMessage(`✓ Fetch API working - Status: ${response.status}`, 'success');
                } catch (e) {
                    logMessage(`✗ Fetch API failed: ${e.message}`, 'error');
                }
                
                // Test 3: Local Storage
                try {
                    localStorage.setItem('test', 'value');
                    const val = localStorage.getItem('test');
                    localStorage.removeItem('test');
                    logMessage(`✓ Local Storage working - Value: ${val}`, 'success');
                } catch (e) {
                    logMessage(`✗ Local Storage failed: ${e.message}`, 'error');
                }
                
                // Test 4: Load main application assets
                const mainAssets = [
                    '/assets/index-Bpr9AhI4.js',
                    '/assets/index-Bp15j8cy.css',
                    '/assets/vendor-CMtS3IUq.js'
                ];
                
                for (const asset of mainAssets) {
                    try {
                        const response = await fetch(asset);
                        if (response.ok) {
                            logMessage(`✓ Asset accessible: ${asset} (${response.status})`, 'success');
                        } else {
                            logMessage(`✗ Asset failed: ${asset} (${response.status})`, 'error');
                        }
                    } catch (e) {
                        logMessage(`✗ Asset error: ${asset} - ${e.message}`, 'error');
                    }
                }
                
                // Test 5: Module loading
                try {
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.src = '/assets/index-Bpr9AhI4.js';
                    script.onload = () => logMessage('✓ Main module loaded successfully', 'success');
                    script.onerror = (e) => logMessage(`✗ Main module failed to load: ${e}`, 'error');
                    document.head.appendChild(script);
                } catch (e) {
                    logMessage(`✗ Module loading error: ${e.message}`, 'error');
                }
                
                // Test 6: Wait and check for React app
                setTimeout(() => {
                    const rootElement = document.getElementById('root');
                    if (rootElement && rootElement.children.length > 0) {
                        logMessage('✓ React app rendered successfully', 'success');
                    } else {
                        logMessage('✗ React app failed to render - #root is empty', 'error');
                        logMessage(`Root element exists: ${!!rootElement}`, 'info');
                        logMessage(`Root children count: ${rootElement?.children.length || 0}`, 'info');
                        logMessage(`Root innerHTML: ${rootElement?.innerHTML || 'N/A'}`, 'info');
                    }
                    
                    status.textContent = 'Diagnostics complete - Check log for details';
                }, 3000);
                
            } catch (e) {
                logMessage(`Fatal diagnostic error: ${e.message}`, 'error');
                logMessage(`Stack: ${e.stack}`, 'error');
            }
        }
        
        runDiagnostics();
    </script>
    
    <!-- Test the actual app components -->
    <div id="root"></div>
    <link rel="stylesheet" crossorigin href="/assets/index-Bp15j8cy.css">
</body>
</html>
