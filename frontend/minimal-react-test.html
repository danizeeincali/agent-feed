<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal React Test</title>
</head>
<body>
    <div id="test-root"></div>
    <div id="output"></div>
    
    <script type="module">
        console.log('🔍 Testing minimal React mounting...');
        
        try {
            // Import React and ReactDOM directly
            const { default: React } = await import('/node_modules/.vite/deps/react.js?v=3936db8a');
            const { default: ReactDOM } = await import('/node_modules/.vite/deps/react-dom_client.js?v=3936db8a');
            
            console.log('✓ React modules imported:', !!React, !!ReactDOM);
            
            // Create a simple component
            const TestComponent = () => {
                return React.createElement('div', { 
                    style: { padding: '20px', background: '#f0f0f0', margin: '10px' } 
                }, 'React is working! Time: ' + new Date().toLocaleTimeString());
            };
            
            // Try to mount it
            const root = ReactDOM.createRoot(document.getElementById('test-root'));
            root.render(React.createElement(TestComponent));
            
            console.log('✅ Minimal React component mounted successfully');
            
            // Now test if the issue is with our App component
            setTimeout(async () => {
                try {
                    console.log('🔍 Testing App import...');
                    const AppModule = await import('/src/App.tsx');
                    console.log('✓ App module imported:', !!AppModule.default);
                    
                    // Test mounting App component
                    const appRoot = ReactDOM.createRoot(document.getElementById('test-root'));
                    appRoot.render(React.createElement(AppModule.default));
                    
                    console.log('✅ App component mounted successfully');
                } catch (error) {
                    console.error('❌ App component failed to mount:', error);
                    document.getElementById('output').innerHTML = `
                        <h3>App Component Error:</h3>
                        <p style="color: red;">${error.message}</p>
                        <p>Stack: ${error.stack}</p>
                    `;
                }
            }, 2000);
            
        } catch (error) {
            console.error('❌ React mounting failed:', error);
            document.getElementById('output').innerHTML = `
                <h3>React Import Error:</h3>
                <p style="color: red;">${error.message}</p>
            `;
        }
    </script>
</body>
</html>
