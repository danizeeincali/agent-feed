<!DOCTYPE html>
<html>
<head>
    <title>Initialize Draft Data</title>
</head>
<body>
    <h1>Draft Data Initializer</h1>
    <p>This page will initialize localStorage with test draft data.</p>
    <button onclick="initializeDrafts()">Initialize Test Drafts</button>
    <button onclick="clearDrafts()">Clear All Drafts</button>
    <div id="status"></div>

    <script>
        function initializeDrafts() {
            const testDrafts = [
                {
                    id: 'draft-1',
                    userId: 'current-user',
                    title: 'My First Draft',
                    content: 'This is a test draft to verify the draft management system works properly.',
                    tags: ['test', 'phase3'],
                    status: 'draft',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    wordCount: 13
                },
                {
                    id: 'draft-2', 
                    userId: 'current-user',
                    title: 'Published Draft Example',
                    content: 'This draft has been published already and serves as an example.',
                    tags: ['published', 'example'],
                    status: 'published',
                    createdAt: new Date(Date.now() - 86400000).toISOString(),
                    updatedAt: new Date().toISOString(),
                    publishedAt: new Date().toISOString(),
                    wordCount: 10
                },
                {
                    id: 'draft-3',
                    userId: 'current-user', 
                    title: 'Draft with Templates',
                    content: 'This draft demonstrates the template system integration with real content.',
                    tags: ['templates', 'demo'],
                    status: 'draft',
                    createdAt: new Date(Date.now() - 172800000).toISOString(),
                    updatedAt: new Date(Date.now() - 86400000).toISOString(),
                    wordCount: 11
                }
            ];

            localStorage.setItem('agent-feed-drafts', JSON.stringify(testDrafts));
            document.getElementById('status').innerHTML = 
                '<p style="color: green;">✅ Successfully initialized ' + testDrafts.length + ' test drafts!</p>' +
                '<p>You can now navigate to <a href="/drafts">the drafts page</a> to see them.</p>';
        }

        function clearDrafts() {
            // Clear both old and new draft storage keys
            localStorage.removeItem('agent-feed-drafts');
            localStorage.removeItem('agentlink-draft'); // Clear old PostCreator drafts too
            document.getElementById('status').innerHTML = 
                '<p style="color: orange;">🗑️ Cleared all draft data from localStorage (both old and new formats).</p>';
        }

        // Check if drafts already exist
        window.onload = function() {
            const existing = localStorage.getItem('agent-feed-drafts');
            if (existing) {
                const drafts = JSON.parse(existing);
                document.getElementById('status').innerHTML = 
                    '<p style="color: blue;">ℹ️ Found ' + drafts.length + ' existing drafts in localStorage.</p>';
            } else {
                document.getElementById('status').innerHTML = 
                    '<p style="color: gray;">No draft data found in localStorage.</p>';
            }
        };
    </script>
</body>
</html>
