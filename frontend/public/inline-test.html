<!DOCTYPE html>
<html>
<head>
    <title>Inline Test</title>
</head>
<body style="font-family: system-ui; padding: 20px;">
    <h1 style="color: green;">✅ HTML is Loading!</h1>
    <p>If you see this green checkmark, the server is working.</p>

    <div id="js-test" style="padding: 20px; background: #fbbf24; margin: 20px 0;">
        Waiting for JavaScript...
    </div>

    <div id="console-output" style="background: #f3f4f6; padding: 10px; font-family: monospace; white-space: pre-wrap;"></div>

    <script>
        // Capture console logs
        const output = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function(...args) {
            originalLog.apply(console, args);
            output.innerHTML += '✅ LOG: ' + args.join(' ') + '\n';
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            output.innerHTML += '❌ ERROR: ' + args.join(' ') + '\n';
        };

        // Test JavaScript
        console.log('JavaScript is running!');

        document.getElementById('js-test').innerHTML =
            '<h2 style="color: white;">✅ JavaScript Works!</h2>' +
            '<p style="color: white;">Time: ' + new Date().toLocaleTimeString() + '</p>';

        // Test window object
        console.log('Window location:', window.location.href);
        console.log('User agent:', navigator.userAgent);

        // Check for React
        if (typeof React !== 'undefined') {
            console.log('React is available:', React.version);
        } else {
            console.log('React is NOT loaded');
        }
    </script>
</body>
</html>
