<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Connection Debug</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <h1>WebSocket Connection Debug</h1>
    <div id="status">Connecting...</div>
    <div id="log"></div>
    <button id="testBtn">Test Connection</button>

    <script>
        const log = (message, type = 'info') => {
            const div = document.createElement('div');
            div.style.color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            div.textContent = `[${new Date().toISOString()}] ${message}`;
            document.getElementById('log').appendChild(div);
            console.log(message);
        };

        const statusDiv = document.getElementById('status');
        
        // Test direct connection to backend
        log('Testing direct connection to http://localhost:3000...');
        
        const socket = io('/', {
            forceNew: true,
            reconnection: true,
            timeout: 5000,
            transports: ['polling', 'websocket']
        });

        socket.on('connect', () => {
            log('✅ Socket.IO connected successfully!', 'success');
            statusDiv.textContent = 'Connected ✅';
            statusDiv.style.color = 'green';
        });

        socket.on('disconnect', (reason) => {
            log(`❌ Socket.IO disconnected: ${reason}`, 'error');
            statusDiv.textContent = `Disconnected: ${reason}`;
            statusDiv.style.color = 'red';
        });

        socket.on('connect_error', (error) => {
            log(`❌ Connection error: ${error.message}`, 'error');
            statusDiv.textContent = `Error: ${error.message}`;
            statusDiv.style.color = 'red';
        });

        document.getElementById('testBtn').onclick = () => {
            log('Emitting test message...');
            socket.emit('test', { message: 'Hello from debug page!' });
        };

        // Test Claude instances API
        fetch('/api/claude/instances')
            .then(response => response.json())
            .then(data => {
                log(`✅ API test successful: ${data.instances?.length || 0} instances`, 'success');
            })
            .catch(error => {
                log(`❌ API test failed: ${error.message}`, 'error');
            });
    </script>
</body>
</html>
