<!DOCTYPE html>
<html>
<head>
    <title>Complete Flow Test</title>
</head>
<body>
    <h1>Testing Claude Instance with Tool Calls</h1>
    <button onclick="createAndConnect()">Create Instance & Connect</button>
    <button onclick="sendCommand()">Send Test Command</button>
    <div id="status"></div>
    <pre id="output" style="background: #000; color: #0f0; padding: 10px; height: 400px; overflow-y: auto;"></pre>
    
    <script>
        let ws;
        let instanceId;
        
        async function createAndConnect() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            // Create instance
            status.textContent = 'Creating instance...';
            const response = await fetch('http://localhost:3000/api/claude/instances', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: 'claude', instanceType: 'interactive' })
            });
            
            const data = await response.json();
            instanceId = data.instance.id;
            status.textContent = `Instance created: ${instanceId}`;
            
            // Connect WebSocket
            ws = new WebSocket(`ws://localhost:3000/terminal?instanceId=${instanceId}`);
            
            ws.onopen = () => {
                status.textContent += ' | WebSocket connected';
                ws.send(JSON.stringify({ type: 'connect', terminalId: instanceId }));
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.data) {
                    output.textContent += msg.data;
                    
                    // Check for tool call indicators
                    if (msg.data.includes('●')) {
                        status.textContent += ' | TOOL CALL DETECTED!';
                        output.style.border = '2px solid lime';
                    }
                }
            };
            
            ws.onerror = (error) => {
                status.textContent = 'WebSocket error!';
                console.error(error);
            };
        }
        
        function sendCommand() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'input',
                    data: 'list files in the docs directory\n'
                }));
                document.getElementById('status').textContent += ' | Command sent';
            }
        }
    </script>
</body>
</html>
