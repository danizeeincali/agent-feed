<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Select Filtering Validation Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .validation-section {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            background: #f9fafb;
        }
        .test-passed { border-color: #10b981; background: #ecfdf5; }
        .test-failed { border-color: #ef4444; background: #fef2f2; }
        .test-warning { border-color: #f59e0b; background: #fffbeb; }
        
        .console-log {
            background: #1f2937;
            color: #f3f4f6;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin: 8px 0;
        }
        
        .api-call {
            background: #1e40af;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            margin: 2px;
            display: inline-block;
        }
        
        .suggestion-item {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 8px;
            border-radius: 12px;
            margin: 2px;
            font-size: 12px;
        }

        .selected-chip {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            margin: 2px;
            font-size: 12px;
        }
    </style>
</head>
<body class="bg-gray-50 p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Test logging system
        const TestLogger = {
            logs: [],
            log: function(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                this.logs.push({ message, type, timestamp });
                console.log(`[${timestamp}] ${message}`);
            },
            getLogs: function() {
                return [...this.logs];
            },
            clear: function() {
                this.logs = [];
            }
        };

        // Mock API service for validation
        const ValidationAPI = {
            baseUrl: 'http://localhost:3000/api/v1',
            
            async testConnection() {
                try {
                    const response = await fetch(`${this.baseUrl}/health`);
                    const data = await response.json();
                    TestLogger.log('✅ Backend connection successful', 'success');
                    return { success: true, data };
                } catch (error) {
                    TestLogger.log('❌ Backend connection failed: ' + error.message, 'error');
                    return { success: false, error: error.message };
                }
            },

            async getFilterSuggestions(type, query) {
                try {
                    TestLogger.log(`🔍 Fetching ${type} suggestions for: "${query}"`, 'info');
                    const params = new URLSearchParams({
                        type: type === 'agents' ? 'agent' : 'hashtag',
                        query: query.trim(),
                        limit: '10'
                    });
                    
                    const response = await fetch(`${this.baseUrl}/filter-suggestions?${params}`);
                    const data = await response.json();
                    
                    if (data.success && data.data) {
                        TestLogger.log(`✅ Got ${data.data.length} ${type} suggestions`, 'success');
                        return data.data.map(item => ({
                            value: item.value,
                            label: item.label || item.value,
                            postCount: item.postCount || 0
                        }));
                    }
                    
                    TestLogger.log(`⚠️ No suggestions returned for ${type}`, 'warning');
                    return [];
                } catch (error) {
                    TestLogger.log(`❌ Error fetching ${type} suggestions: ${error.message}`, 'error');
                    return [];
                }
            },

            async getFilteredPosts(filter) {
                try {
                    TestLogger.log('📊 Applying filter: ' + JSON.stringify(filter), 'info');
                    
                    const params = new URLSearchParams({
                        limit: '20',
                        offset: '0',
                        filter: 'multi-select',
                        sortBy: 'published_at',
                        sortOrder: 'DESC'
                    });
                    
                    if (filter.agents && filter.agents.length > 0) {
                        params.set('agents', filter.agents.join(','));
                    }
                    if (filter.hashtags && filter.hashtags.length > 0) {
                        params.set('hashtags', filter.hashtags.join(','));
                    }
                    params.set('mode', filter.combinationMode || 'AND');
                    
                    const response = await fetch(`${this.baseUrl}/agent-posts?${params}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        TestLogger.log(`✅ Filter applied successfully: ${data.total || 0} posts found`, 'success');
                        return data;
                    } else {
                        TestLogger.log('⚠️ Filter applied but no results', 'warning');
                        return { success: false, data: [], total: 0 };
                    }
                } catch (error) {
                    TestLogger.log(`❌ Error applying filter: ${error.message}`, 'error');
                    return { success: false, data: [], total: 0, error: error.message };
                }
            }
        };

        // MultiSelect component for testing
        const TestMultiSelect = ({ type, value, onChange, onSuggestionsRequest, suggestions }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [inputValue, setInputValue] = useState('');
            const [loading, setLoading] = useState(false);
            
            const handleInputChange = async (e) => {
                const query = e.target.value;
                setInputValue(query);
                
                if (query.trim() && onSuggestionsRequest) {
                    setLoading(true);
                    await onSuggestionsRequest(type, query);
                    setLoading(false);
                }
            };
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && inputValue.trim()) {
                    e.preventDefault();
                    const suggestion = suggestions.find(s => 
                        s.value.toLowerCase().includes(inputValue.toLowerCase()) ||
                        s.label.toLowerCase().includes(inputValue.toLowerCase())
                    );
                    
                    if (suggestion && !value.includes(suggestion.value)) {
                        onChange([...value, suggestion.value]);
                        setInputValue('');
                        TestLogger.log(`✅ Added ${type}: "${suggestion.value}" via Enter key`, 'success');
                    }
                }
            };
            
            const removeItem = (item) => {
                onChange(value.filter(v => v !== item));
                TestLogger.log(`🗑️ Removed ${type}: "${item}"`, 'info');
            };
            
            return (
                <div className="relative">
                    <div className="border border-gray-300 rounded p-2 min-h-[100px]">
                        <div className="mb-2">
                            <strong>{type === 'agents' ? 'Agents' : 'Hashtags'} ({value.length} selected):</strong>
                        </div>
                        
                        {/* Selected items */}
                        <div className="mb-2">
                            {value.map(item => (
                                <span key={item} className="selected-chip">
                                    {item}
                                    <button 
                                        onClick={() => removeItem(item)}
                                        className="ml-1 text-white hover:text-red-200"
                                    >×</button>
                                </span>
                            ))}
                        </div>
                        
                        {/* Input */}
                        <div className="relative">
                            <input
                                type="text"
                                value={inputValue}
                                onChange={handleInputChange}
                                onKeyDown={handleKeyDown}
                                onFocus={() => setIsOpen(true)}
                                onBlur={() => setTimeout(() => setIsOpen(false), 200)}
                                placeholder={`Search ${type}... (press Enter to add)`}
                                className="w-full border border-gray-200 rounded px-2 py-1"
                            />
                            {loading && <div className="absolute right-2 top-1">🔄</div>}
                        </div>
                        
                        {/* Suggestions */}
                        {isOpen && inputValue.trim() && (
                            <div className="mt-1 bg-white border border-gray-300 rounded shadow-lg max-h-32 overflow-y-auto">
                                {suggestions
                                    .filter(s => !value.includes(s.value))
                                    .filter(s => 
                                        s.value.toLowerCase().includes(inputValue.toLowerCase()) ||
                                        s.label.toLowerCase().includes(inputValue.toLowerCase())
                                    )
                                    .map(suggestion => (
                                        <div
                                            key={suggestion.value}
                                            onClick={() => {
                                                if (!value.includes(suggestion.value)) {
                                                    onChange([...value, suggestion.value]);
                                                    setInputValue('');
                                                    TestLogger.log(`✅ Added ${type}: "${suggestion.value}" via click`, 'success');
                                                }
                                            }}
                                            className="px-2 py-1 hover:bg-blue-50 cursor-pointer text-sm"
                                        >
                                            {suggestion.label} 
                                            {suggestion.postCount > 0 && (
                                                <span className="text-gray-500">({suggestion.postCount} posts)</span>
                                            )}
                                        </div>
                                    ))
                                }
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Main validation component
        const MultiSelectValidation = () => {
            const [testResults, setTestResults] = useState({});
            const [logs, setLogs] = useState([]);
            const [connectionStatus, setConnectionStatus] = useState('untested');
            const [agentSuggestions, setAgentSuggestions] = useState([]);
            const [hashtagSuggestions, setHashtagSuggestions] = useState([]);
            const [selectedAgents, setSelectedAgents] = useState([]);
            const [selectedHashtags, setSelectedHashtags] = useState([]);
            const [combinationMode, setCombinationMode] = useState('AND');
            const [filterResults, setFilterResults] = useState(null);

            // Update logs periodically
            useEffect(() => {
                const interval = setInterval(() => {
                    setLogs(TestLogger.getLogs());
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Test 1: Backend Connection
            const testBackendConnection = async () => {
                TestLogger.log('🧪 Test 1: Testing backend connection...', 'info');
                const result = await ValidationAPI.testConnection();
                setConnectionStatus(result.success ? 'connected' : 'failed');
                updateTestResult('backendConnection', result.success);
            };

            // Test 2: Agent Suggestions
            const testAgentSuggestions = async () => {
                TestLogger.log('🧪 Test 2: Testing agent suggestions...', 'info');
                const suggestions = await ValidationAPI.getFilterSuggestions('agents', '');
                setAgentSuggestions(suggestions);
                
                const hasProductionValidator = suggestions.some(s => 
                    s.value.includes('ProductionValidator') || s.label.includes('ProductionValidator')
                );
                const hasDatabaseManager = suggestions.some(s => 
                    s.value.includes('DatabaseManager') || s.label.includes('DatabaseManager')
                );
                const hasAPIIntegrator = suggestions.some(s => 
                    s.value.includes('APIIntegrator') || s.label.includes('APIIntegrator')
                );
                
                const passed = suggestions.length > 0 && (hasProductionValidator || hasDatabaseManager || hasAPIIntegrator);
                updateTestResult('agentSuggestions', passed);
                
                if (passed) {
                    TestLogger.log(`✅ Found ${suggestions.length} agent suggestions`, 'success');
                } else {
                    TestLogger.log('❌ No suitable agent suggestions found', 'error');
                }
            };

            // Test 3: Type-ahead "prod" search
            const testProdSearch = async () => {
                TestLogger.log('🧪 Test 3: Testing "prod" search for ProductionValidator...', 'info');
                const suggestions = await ValidationAPI.getFilterSuggestions('agents', 'prod');
                
                const hasProductionValidator = suggestions.some(s => 
                    s.value.toLowerCase().includes('production') || 
                    s.label.toLowerCase().includes('production')
                );
                
                updateTestResult('prodSearch', hasProductionValidator);
                
                if (hasProductionValidator) {
                    TestLogger.log('✅ "prod" search successfully suggests ProductionValidator', 'success');
                } else {
                    TestLogger.log('❌ "prod" search does not suggest ProductionValidator', 'error');
                }
            };

            // Test 4: Hashtag Suggestions
            const testHashtagSuggestions = async () => {
                TestLogger.log('🧪 Test 4: Testing hashtag suggestions...', 'info');
                const suggestions = await ValidationAPI.getFilterSuggestions('hashtags', '');
                setHashtagSuggestions(suggestions);
                
                const passed = suggestions.length > 0;
                updateTestResult('hashtagSuggestions', passed);
                
                if (passed) {
                    TestLogger.log(`✅ Found ${suggestions.length} hashtag suggestions`, 'success');
                } else {
                    TestLogger.log('❌ No hashtag suggestions found', 'error');
                }
            };

            // Test 5: Filter Application
            const testFilterApplication = async () => {
                if (selectedAgents.length === 0 && selectedHashtags.length === 0) {
                    TestLogger.log('⚠️ Test 5: No agents or hashtags selected for filtering test', 'warning');
                    return;
                }
                
                TestLogger.log('🧪 Test 5: Testing filter application...', 'info');
                const filter = {
                    agents: selectedAgents,
                    hashtags: selectedHashtags,
                    combinationMode
                };
                
                const results = await ValidationAPI.getFilteredPosts(filter);
                setFilterResults(results);
                
                const passed = results.success !== false;
                updateTestResult('filterApplication', passed);
            };

            const handleSuggestionsRequest = async (type, query) => {
                const suggestions = await ValidationAPI.getFilterSuggestions(type, query);
                if (type === 'agents') {
                    setAgentSuggestions(suggestions);
                } else {
                    setHashtagSuggestions(suggestions);
                }
            };

            const updateTestResult = (testName, passed) => {
                setTestResults(prev => ({ ...prev, [testName]: passed }));
            };

            const runAllTests = async () => {
                TestLogger.clear();
                TestLogger.log('🚀 Starting comprehensive multi-select filtering validation...', 'info');
                
                await testBackendConnection();
                await testAgentSuggestions();
                await testProdSearch();
                await testHashtagSuggestions();
            };

            const getTestStatus = (testName) => {
                const result = testResults[testName];
                if (result === true) return 'test-passed';
                if (result === false) return 'test-failed';
                return 'validation-section';
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <h1 className="text-3xl font-bold text-center mb-8 text-blue-600">
                        Multi-Select Filtering Validation Test
                    </h1>

                    {/* Control Panel */}
                    <div className="validation-section">
                        <h2 className="text-xl font-semibold mb-4">Test Controls</h2>
                        <div className="flex gap-4 mb-4">
                            <button 
                                onClick={runAllTests}
                                className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
                            >
                                Run All Tests
                            </button>
                            <button 
                                onClick={() => TestLogger.clear()}
                                className="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700"
                            >
                                Clear Logs
                            </button>
                        </div>
                        
                        <div className="text-sm">
                            Backend: <span className={connectionStatus === 'connected' ? 'text-green-600' : connectionStatus === 'failed' ? 'text-red-600' : 'text-gray-600'}>
                                {connectionStatus === 'connected' ? '✅ Connected' : connectionStatus === 'failed' ? '❌ Failed' : '⏳ Not tested'}
                            </span>
                        </div>
                    </div>

                    {/* Test Results Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Test 1: Backend Connection */}
                        <div className={getTestStatus('backendConnection')}>
                            <h3 className="text-lg font-semibold mb-2">Test 1: Backend Connection</h3>
                            <p className="text-sm text-gray-600 mb-2">Verify connection to localhost:3000 API</p>
                            <button 
                                onClick={testBackendConnection}
                                className="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600"
                            >
                                Test Connection
                            </button>
                        </div>

                        {/* Test 2: Agent Suggestions */}
                        <div className={getTestStatus('agentSuggestions')}>
                            <h3 className="text-lg font-semibold mb-2">Test 2: Agent Suggestions</h3>
                            <p className="text-sm text-gray-600 mb-2">Load agent suggestions from API</p>
                            <button 
                                onClick={testAgentSuggestions}
                                className="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600"
                            >
                                Load Agent Suggestions
                            </button>
                            <div className="mt-2">
                                {agentSuggestions.slice(0, 5).map(suggestion => (
                                    <span key={suggestion.value} className="suggestion-item">
                                        {suggestion.label}
                                    </span>
                                ))}
                                {agentSuggestions.length > 5 && (
                                    <span className="text-gray-500 text-sm">...and {agentSuggestions.length - 5} more</span>
                                )}
                            </div>
                        </div>

                        {/* Test 3: Prod Search */}
                        <div className={getTestStatus('prodSearch')}>
                            <h3 className="text-lg font-semibold mb-2">Test 3: "Prod" Search</h3>
                            <p className="text-sm text-gray-600 mb-2">Type "prod" should suggest ProductionValidator</p>
                            <button 
                                onClick={testProdSearch}
                                className="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600"
                            >
                                Test Prod Search
                            </button>
                        </div>

                        {/* Test 4: Hashtag Suggestions */}
                        <div className={getTestStatus('hashtagSuggestions')}>
                            <h3 className="text-lg font-semibold mb-2">Test 4: Hashtag Suggestions</h3>
                            <p className="text-sm text-gray-600 mb-2">Load hashtag suggestions from API</p>
                            <button 
                                onClick={testHashtagSuggestions}
                                className="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600"
                            >
                                Load Hashtag Suggestions
                            </button>
                            <div className="mt-2">
                                {hashtagSuggestions.slice(0, 5).map(suggestion => (
                                    <span key={suggestion.value} className="suggestion-item">
                                        #{suggestion.label}
                                    </span>
                                ))}
                                {hashtagSuggestions.length > 5 && (
                                    <span className="text-gray-500 text-sm">...and {hashtagSuggestions.length - 5} more</span>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Interactive Multi-Select Testing */}
                    <div className="validation-section mt-6">
                        <h2 className="text-xl font-semibold mb-4">Interactive Multi-Select Testing</h2>
                        <p className="text-sm text-gray-600 mb-4">
                            Test the complete workflow: type → suggestions → select → apply → filter
                        </p>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                            <TestMultiSelect 
                                type="agents"
                                value={selectedAgents}
                                onChange={setSelectedAgents}
                                onSuggestionsRequest={handleSuggestionsRequest}
                                suggestions={agentSuggestions}
                            />
                            
                            <TestMultiSelect 
                                type="hashtags"
                                value={selectedHashtags}
                                onChange={setSelectedHashtags}
                                onSuggestionsRequest={handleSuggestionsRequest}
                                suggestions={hashtagSuggestions}
                            />
                        </div>

                        {/* Combination Mode */}
                        <div className="mb-4">
                            <strong>Filter Mode:</strong>
                            <div className="mt-2">
                                <label className="mr-4">
                                    <input 
                                        type="radio" 
                                        value="AND" 
                                        checked={combinationMode === 'AND'} 
                                        onChange={(e) => setCombinationMode(e.target.value)}
                                        className="mr-1"
                                    />
                                    AND - Match all selected
                                </label>
                                <label>
                                    <input 
                                        type="radio" 
                                        value="OR" 
                                        checked={combinationMode === 'OR'} 
                                        onChange={(e) => setCombinationMode(e.target.value)}
                                        className="mr-1"
                                    />
                                    OR - Match any selected
                                </label>
                            </div>
                        </div>

                        {/* Apply Filter Button */}
                        <button 
                            onClick={testFilterApplication}
                            disabled={selectedAgents.length === 0 && selectedHashtags.length === 0}
                            className="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
                        >
                            Apply Filter
                        </button>

                        {/* Filter Results */}
                        {filterResults && (
                            <div className={`mt-4 p-4 rounded ${filterResults.success !== false ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
                                <h3 className="font-semibold mb-2">Filter Results:</h3>
                                {filterResults.success !== false ? (
                                    <div>
                                        <p>✅ Found {filterResults.total || 0} matching posts</p>
                                        {filterResults.data && filterResults.data.slice(0, 3).map(post => (
                                            <div key={post.id} className="mt-2 p-2 bg-white rounded border text-sm">
                                                <strong>{post.title}</strong> by {post.authorAgent}
                                                <div className="text-gray-600 text-xs mt-1">
                                                    {post.content?.substring(0, 100)}...
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <p>❌ Filter failed: {filterResults.error || 'Unknown error'}</p>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Console Logs */}
                    <div className="validation-section">
                        <h2 className="text-xl font-semibold mb-4">Console Logs & Evidence</h2>
                        <div className="console-log">
                            {logs.map((log, index) => (
                                <div key={index} className={`mb-1 ${
                                    log.type === 'success' ? 'text-green-400' : 
                                    log.type === 'error' ? 'text-red-400' : 
                                    log.type === 'warning' ? 'text-yellow-400' : 
                                    'text-gray-300'
                                }`}>
                                    [{log.timestamp}] {log.message}
                                </div>
                            ))}
                            {logs.length === 0 && (
                                <div className="text-gray-400">No logs yet. Click "Run All Tests" to start validation.</div>
                            )}
                        </div>
                    </div>

                    {/* Test Summary */}
                    <div className="validation-section">
                        <h2 className="text-xl font-semibold mb-4">Validation Summary</h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                            {Object.entries({
                                'Backend Connection': 'backendConnection',
                                'Agent Suggestions': 'agentSuggestions', 
                                'Prod Search': 'prodSearch',
                                'Hashtag Suggestions': 'hashtagSuggestions',
                                'Filter Application': 'filterApplication'
                            }).map(([label, key]) => (
                                <div key={key} className={`p-3 rounded ${
                                    testResults[key] === true ? 'bg-green-100 text-green-800' :
                                    testResults[key] === false ? 'bg-red-100 text-red-800' :
                                    'bg-gray-100 text-gray-600'
                                }`}>
                                    <div className="font-semibold">{label}</div>
                                    <div className="text-lg">
                                        {testResults[key] === true ? '✅' : 
                                         testResults[key] === false ? '❌' : '⏳'}
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="mt-4 text-center">
                            <strong>Overall Status: </strong>
                            {Object.values(testResults).every(result => result === true) ? 
                                <span className="text-green-600">✅ ALL TESTS PASSED</span> :
                                Object.values(testResults).some(result => result === false) ?
                                <span className="text-red-600">❌ SOME TESTS FAILED</span> :
                                <span className="text-gray-600">⏳ TESTS PENDING</span>
                            }
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<MultiSelectValidation />, document.getElementById('root'));
    </script>
</body>
</html>
