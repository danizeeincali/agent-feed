<!DOCTYPE html>
<html>
<head>
  <title>Mermaid Direct Test</title>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    window.addEventListener('DOMContentLoaded', async () => {
      console.log('Testing Mermaid v11 directly...');

      try {
        // Initialize
        mermaid.initialize({
          startOnLoad: false,
          securityLevel: 'strict'
        });
        console.log('✅ Mermaid initialized');

        // Render
        const chartCode = `graph TD
  A[Start] --> B[Process]
  B --> C[End]`;

        console.log('Rendering chart...');
        const { svg } = await mermaid.render('test-diagram', chartCode);
        console.log('✅ Render complete, SVG length:', svg.length);

        document.getElementById('output').innerHTML = svg;
        document.getElementById('status').textContent = '✅ SUCCESS: Diagram rendered!';

      } catch (err) {
        console.error('❌ Error:', err);
        document.getElementById('status').textContent = '❌ ERROR: ' + err.message;
      }
    });
  </script>
</head>
<body>
  <h1>Mermaid v11 Direct Test</h1>
  <p id="status">Testing...</p>
  <div id="output" style="border: 1px solid #ccc; padding: 20px; margin: 20px 0;"></div>
</body>
</html>
